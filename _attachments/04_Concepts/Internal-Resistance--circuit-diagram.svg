<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="380" height="220" font-family="sans-serif" font-size="13">
  <!-- Battery box outline (cell + internal resistance) -->
  <rect x="30" y="60" width="140" height="100" fill="#eef" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="34" y="54" fill="#555" font-size="11">Cell (ε, r)</text>
  <!-- EMF source symbol (long/short lines) -->
  <line x1="70" y1="90" x2="70" y2="130" stroke="#333" stroke-width="1"/>
  <line x1="58" y1="97" x2="82" y2="97" stroke="#333" stroke-width="3"/>
  <line x1="63" y1="118" x2="77" y2="118" stroke="#333" stroke-width="1.5"/>
  <text x="86" y="108" fill="#333" font-size="13">ε</text>
  <!-- Wire inside cell -->
  <line x1="70" y1="90" x2="70" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="70" x2="110" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="130" x2="70" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="70" y1="150" x2="110" y2="150" stroke="#333" stroke-width="1.5"/>
  <!-- Internal resistance r (zigzag) -->
  <polyline points="110,70 118,70 122,58 130,82 138,58 146,82 150,70 158,70" fill="none" stroke="#e55" stroke-width="2"/>
  <text x="120" y="50" fill="#e55" font-size="13">r (internal)</text>
  <!-- Wire from battery to external circuit -->
  <line x1="158" y1="70" x2="170" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="150" x2="170" y2="150" stroke="#333" stroke-width="1.5"/>
  <!-- External resistance R (zigzag) -->
  <line x1="170" y1="70" x2="220" y2="70" stroke="#333" stroke-width="1.5"/>
  <polyline points="220,70 228,70 232,58 240,82 248,58 256,82 260,70 310,70" fill="none" stroke="#44c" stroke-width="2"/>
  <text x="228" y="50" fill="#44c" font-size="13">R (external)</text>
  <line x1="310" y1="70" x2="340" y2="70" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="70" x2="340" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="150" x2="170" y2="150" stroke="#333" stroke-width="1.5"/>
  <!-- Voltage labels -->
  <!-- Lost volts across r -->
  <line x1="110" y1="75" x2="158" y2="75" stroke="#e55" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="112" y="90" fill="#e55" font-size="11">Ir (lost volts)</text>
  <!-- Terminal pd across R -->
  <line x1="220" y1="75" x2="310" y2="75" stroke="#44c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="235" y="90" fill="#44c" font-size="11">V = IR</text>
  <!-- Current arrow -->
  <text x="185" y="140" fill="#333" font-size="12">I →</text>
  <!-- Title -->
  <text x="5" y="205" fill="#333" font-size="11" font-weight="bold">ε = V + Ir  ⟹  ε = I(R + r)</text>
</svg>
