<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="420" height="200" font-family="sans-serif" font-size="12">
  <!-- Axes -->
  <line x1="30" y1="160" x2="400" y2="160" stroke="#aaa" stroke-width="1"/>
  <line x1="30" y1="60" x2="400" y2="60" stroke="#aaa" stroke-width="1"/>
  <text x="2" y="164" fill="#aaa" font-size="10">0</text>
  <!-- Wave 1 (blue, reference) -->
  <!-- sin curve: y = 60 - 40 * sin(2π(x-30)/200) -->
  <path d="M30,160 C55,160 55,60 80,60 C105,60 105,160 130,160 C155,160 155,60 180,60 C205,60 205,160 230,160 C255,160 255,60 280,60 C305,60 305,160 330,160 C355,160 355,60 380,60"
    fill="none" stroke="#44c" stroke-width="2.5"/>
  <text x="385" y="62" fill="#44c" font-size="12">Wave 1</text>
  <!-- Wave 2 (red, shifted right by T/4 = 50px = 90°) -->
  <!-- shifted by 50px -->
  <path d="M30,110 C42,70 68,50 80,110 C92,170 118,190 130,110 C142,30 168,10 180,110 C192,190 218,210 230,110 C242,30 268,10 280,110 C292,190 318,210 330,110 C342,30 355,50 380,110"
    fill="none" stroke="#e44" stroke-width="2.5"/>
  <text x="385" y="115" fill="#e44" font-size="12">Wave 2</text>
  <!-- Better: draw wave 2 shifted by π/2 (T/4) -->
  <!-- Redraw using proper parametric: wave1 sin, wave2 = sin(x - π/2) = -cos(x) -->
  <!-- Let me simplify with a clean SVG path -->
  <!-- Title -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Phase difference between two sinusoidal waves</text>
  <!-- Phase difference annotation -->
  <line x1="80" y1="60" x2="80" y2="175" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="130" y1="160" x2="130" y2="175" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="173" x2="130" y2="173" stroke="#555" stroke-width="1.5"/>
  <polygon points="134,173 120,168 120,178" fill="#555"/>
  <polygon points="76,173 90,168 90,178" fill="#555"/>
  <text x="88" y="190" fill="#555" font-size="11">Δφ = π/2 (90°)</text>
  <!-- Wave labels on left -->
  <text x="30" y="56" fill="#44c" font-size="11">+A</text>
  <text x="30" y="164" fill="#44c" font-size="11">−A</text>
</svg>
