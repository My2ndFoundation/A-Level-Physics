<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260" font-family="sans-serif" font-size="13">
  <!-- Axes -->
  <line x1="60" y1="220" x2="340" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="220" x2="60" y2="30" stroke="#333" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="180" y="250" fill="#333" font-size="13" text-anchor="middle">Frequency f / Hz</text>
  <text x="15" y="130" fill="#333" font-size="13" transform="rotate(-90,15,130)">KE_max / J</text>
  <!-- Threshold frequency f0 on x-axis -->
  <line x1="150" y1="220" x2="150" y2="226" stroke="#333" stroke-width="1.5"/>
  <text x="135" y="240" fill="#555" font-size="12">f₀</text>
  <!-- Below threshold: no emission (dashed zero line) -->
  <line x1="60" y1="220" x2="150" y2="220" stroke="#aaa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="68" y="215" fill="#aaa" font-size="11">no emission (f &lt; f₀)</text>
  <!-- Above threshold: linear rise with gradient h -->
  <line x1="150" y1="220" x2="320" y2="90" stroke="#44c" stroke-width="2.5"/>
  <!-- Gradient label -->
  <text x="265" y="105" fill="#44c" font-size="12">gradient = h</text>
  <!-- Work function intercept annotation -->
  <!-- Extend line back to y-axis: KE = h(f - f0) = hf - hf0 = hf - φ -->
  <!-- y-intercept would be at KE = -φ (below axis) -->
  <line x1="60" y1="283" x2="150" y2="220" stroke="#44c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="14" y="287" fill="#e44" font-size="12">−φ</text>
  <line x1="60" y1="283" x2="67" y2="283" stroke="#e44" stroke-width="1.5"/>
  <!-- Annotation lines -->
  <line x1="60" y1="220" x2="60" y2="287" stroke="#aaa" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Zero on axes -->
  <text x="44" y="224" fill="#333" font-size="12">0</text>
  <!-- Equation -->
  <text x="170" y="180" fill="#333" font-size="13">hf = φ + KE_max</text>
  <!-- Title -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Photoelectric effect: KE_max vs frequency</text>
</svg>
