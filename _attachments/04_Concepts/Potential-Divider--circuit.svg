<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" width="280" height="300" font-family="sans-serif" font-size="13">
  <!-- Supply voltage Vs -->
  <!-- Vertical left branch -->
  <line x1="60" y1="30" x2="60" y2="90" stroke="#333" stroke-width="1.8"/>
  <!-- R1 (zigzag top) -->
  <polyline points="60,90 68,90 72,78 80,102 88,78 96,102 100,90 110,90" fill="none" stroke="#e44" stroke-width="2"/>
  <text x="66" y="74" fill="#e44" font-size="13">R₁</text>
  <!-- Wire between R1 and R2 (junction point) -->
  <line x1="110" y1="90" x2="160" y2="90" stroke="#333" stroke-width="1.8"/>
  <!-- Junction dot -->
  <circle cx="160" cy="90" r="4" fill="#333"/>
  <!-- R2 (zigzag bottom) -->
  <line x1="110" y1="90" x2="110" y2="130" stroke="#333" stroke-width="1.8"/>
  <polyline points="110,130 118,130 122,118 130,142 138,118 146,142 150,130 160,130" fill="none" stroke="#44c" stroke-width="2"/>
  <text x="116" y="158" fill="#44c" font-size="13">R₂</text>
  <line x1="160" y1="130" x2="160" y2="170" stroke="#333" stroke-width="1.8"/>
  <!-- Close bottom of circuit -->
  <line x1="60" y1="170" x2="160" y2="170" stroke="#333" stroke-width="1.8"/>
  <line x1="60" y1="30" x2="160" y2="30" stroke="#333" stroke-width="1.8"/>
  <!-- Supply voltage label on left -->
  <line x1="30" y1="30" x2="30" y2="170" stroke="#555" stroke-width="1.5"/>
  <polygon points="30,26 25,40 35,40" fill="#555"/>
  <polygon points="30,174 25,160 35,160" fill="#555"/>
  <text x="5" y="104" fill="#555" font-size="13">Vₛ</text>
  <!-- V_out tapped across R2 -->
  <line x1="160" y1="90" x2="220" y2="90" stroke="#090" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="160" y1="170" x2="220" y2="170" stroke="#090" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="220" y1="90" x2="220" y2="170" stroke="#090" stroke-width="1.5"/>
  <polygon points="220,86 215,100 225,100" fill="#090"/>
  <polygon points="220,174 215,160 225,160" fill="#090"/>
  <text x="226" y="134" fill="#090" font-size="13">V_out</text>
  <!-- Formula -->
  <text x="30" y="220" fill="#333" font-size="13">V_out = Vₛ × R₂ / (R₁ + R₂)</text>
  <!-- Title -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Potential divider circuit</text>
  <!-- Current direction indicator -->
  <text x="65" y="58" fill="#333" font-size="11">I →</text>
</svg>
