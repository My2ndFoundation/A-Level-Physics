<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260" font-family="sans-serif" font-size="13">
  <!-- Screen on right -->
  <line x1="320" y1="10" x2="320" y2="250" stroke="#555" stroke-width="3"/>
  <!-- Source S1 (top) -->
  <circle cx="60" cy="90" r="6" fill="#e44"/>
  <text x="30" y="88" fill="#e44" font-size="13">S₁</text>
  <!-- Source S2 (bottom) -->
  <circle cx="60" cy="170" r="6" fill="#44e"/>
  <text x="30" y="168" fill="#44e" font-size="13">S₂</text>
  <!-- Slit separator line -->
  <line x1="60" y1="60" x2="60" y2="200" stroke="#333" stroke-width="2"/>
  <!-- Point P on screen (constructive) -->
  <circle cx="320" cy="100" r="5" fill="#090"/>
  <text x="327" y="104" fill="#090" font-size="12">P (bright)</text>
  <!-- Rays to P -->
  <line x1="60" y1="90" x2="320" y2="100" stroke="#e44" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="60" y1="170" x2="320" y2="100" stroke="#44e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Path difference label -->
  <text x="120" y="150" fill="#555" font-size="12">path diff = nλ</text>
  <text x="120" y="165" fill="#090" font-size="11">(constructive)</text>
  <!-- Point Q on screen (destructive) -->
  <circle cx="320" cy="155" r="5" fill="#c00"/>
  <text x="327" y="159" fill="#c00" font-size="12">Q (dark)</text>
  <!-- Rays to Q -->
  <line x1="60" y1="90" x2="320" y2="155" stroke="#e44" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="60" y1="170" x2="320" y2="155" stroke="#44e" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- slit separation s -->
  <line x1="70" y1="90" x2="70" y2="170" stroke="#333" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="74" y="133" fill="#333" font-size="12">s</text>
  <!-- Screen distance D -->
  <line x1="60" y1="240" x2="320" y2="240" stroke="#333" stroke-width="1"/>
  <text x="175" y="255" fill="#333" font-size="12">D</text>
  <!-- Title -->
  <text x="5" y="20" fill="#333" font-size="12" font-weight="bold">Two-source interference geometry</text>
</svg>
