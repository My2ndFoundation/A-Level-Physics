<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280" font-family="sans-serif">
  <rect width="320" height="280" fill="#f9f9f9" rx="6"/>
  <!-- Energy axis -->
  <line x1="60" y1="20" x2="60" y2="250" stroke="#555" stroke-width="1.5"/>
  <text x="25" y="140" transform="rotate(-90,25,140)" font-size="11" fill="#555" text-anchor="middle">Energy (eV)</text>
  <!-- Zero level (ionisation) -->
  <line x1="55" y1="30" x2="280" y2="30" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="285" y="34" font-size="10" fill="#888">0 eV (ionisation)</text>
  <!-- Energy levels (schematic; no real numbers, just showing discrete structure) -->
  <!-- n=4 -->
  <line x1="65" y1="80" x2="190" y2="80" stroke="#2980b9" stroke-width="2"/>
  <text x="195" y="84" font-size="10" fill="#2980b9">n = 4 (excited)</text>
  <!-- n=3 -->
  <line x1="65" y1="120" x2="190" y2="120" stroke="#2980b9" stroke-width="2"/>
  <text x="195" y="124" font-size="10" fill="#2980b9">n = 3 (excited)</text>
  <!-- n=2 -->
  <line x1="65" y1="165" x2="190" y2="165" stroke="#2980b9" stroke-width="2"/>
  <text x="195" y="169" font-size="10" fill="#2980b9">n = 2 (excited)</text>
  <!-- n=1 ground state -->
  <line x1="65" y1="220" x2="190" y2="220" stroke="#c0392b" stroke-width="2.5"/>
  <text x="195" y="224" font-size="10" fill="#c0392b">n = 1 (ground state)</text>
  <!-- Photon emission transition: n=3 → n=1 -->
  <defs>
    <marker id="aDown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <line x1="110" y1="120" x2="110" y2="215" stroke="#27ae60" stroke-width="2" marker-end="url(#aDown)"/>
  <text x="115" y="170" font-size="10" fill="#27ae60">photon emitted</text>
  <text x="115" y="182" font-size="10" fill="#27ae60">ΔE = hf</text>
  <!-- Photon symbol -->
  <text x="88" y="175" font-size="16" fill="#FFB300">γ</text>
  <!-- Caption -->
  <text x="160" y="260" text-anchor="middle" font-size="10" fill="#888">Discrete levels only — no in-between states</text>
</svg>
