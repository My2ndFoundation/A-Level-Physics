<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180" font-family="sans-serif" font-size="12">
  <!-- Unpolarised light on the left: multiple oscillation arrows -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Polarisation: polariser and analyser</text>
  <!-- Light ray axis -->
  <line x1="10" y1="90" x2="400" y2="90" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Unpolarised: arrows in all directions -->
  <line x1="30" y1="70" x2="30" y2="110" stroke="#555" stroke-width="2"/>
  <line x1="20" y1="80" x2="40" y2="100" stroke="#555" stroke-width="2"/>
  <line x1="20" y1="100" x2="40" y2="80" stroke="#555" stroke-width="2"/>
  <text x="10" y="130" fill="#555" font-size="11">Unpolarised\n(all planes)</text>
  <!-- Arrow of propagation -->
  <line x1="50" y1="90" x2="100" y2="90" stroke="#333" stroke-width="1.5"/>
  <polygon points="104,90 90,85 90,95" fill="#333"/>
  <!-- Polariser 1 (vertical transmission axis) -->
  <rect x="110" y="55" width="14" height="70" fill="#cdf" stroke="#335" stroke-width="1.5" rx="2"/>
  <line x1="117" y1="55" x2="117" y2="125" stroke="#44c" stroke-width="2.5"/>
  <text x="104" y="145" fill="#44c" font-size="11">Polariser</text>
  <text x="100" y="157" fill="#44c" font-size="10">(vertical axis)</text>
  <!-- Polarised wave (vertical arrow only) after polariser -->
  <line x1="130" y1="70" x2="130" y2="110" stroke="#44c" stroke-width="2.5"/>
  <polygon points="130,66 125,80 135,80" fill="#44c"/>
  <polygon points="130,114 125,100 135,100" fill="#44c"/>
  <text x="128" y="130" fill="#44c" font-size="10">½I₀</text>
  <line x1="145" y1="90" x2="200" y2="90" stroke="#333" stroke-width="1.5"/>
  <polygon points="204,90 190,85 190,95" fill="#333"/>
  <!-- Analyser at 0° (aligned): maximum transmission -->
  <rect x="210" y="55" width="14" height="70" fill="#cdf" stroke="#335" stroke-width="1.5" rx="2"/>
  <line x1="217" y1="55" x2="217" y2="125" stroke="#090" stroke-width="2.5"/>
  <text x="204" y="145" fill="#090" font-size="11">Analyser</text>
  <text x="200" y="157" fill="#090" font-size="10">(0° → max)</text>
  <!-- Transmitted light (bright) -->
  <line x1="227" y1="70" x2="227" y2="110" stroke="#090" stroke-width="2.5"/>
  <polygon points="227,66 222,80 232,80" fill="#090"/>
  <text x="225" y="130" fill="#090" font-size="10">I_max</text>
  <!-- Arrow to next analyser at 90° -->
  <line x1="245" y1="90" x2="295" y2="90" stroke="#333" stroke-width="1.5"/>
  <polygon points="299,90 285,85 285,95" fill="#333"/>
  <!-- Analyser at 90° (crossed): no transmission -->
  <rect x="305" y="55" width="14" height="70" fill="#fdd" stroke="#a33" stroke-width="1.5" rx="2"/>
  <line x1="270" y1="90" x2="320" y2="90" stroke="#c00" stroke-width="2.5"/>
  <text x="292" y="145" fill="#c00" font-size="11">Analyser</text>
  <text x="288" y="157" fill="#c00" font-size="10">(90° → zero)</text>
  <!-- No transmission symbol -->
  <text x="328" y="95" fill="#c00" font-size="18" font-weight="bold">∅</text>
  <text x="326" y="130" fill="#c00" font-size="10">I = 0</text>
</svg>
