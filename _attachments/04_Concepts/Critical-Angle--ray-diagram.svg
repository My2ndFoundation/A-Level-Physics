<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" font-family="sans-serif">
  <rect width="320" height="220" fill="#f9f9f9" rx="6"/>
  <!-- Interface boundary -->
  <line x1="20" y1="110" x2="300" y2="110" stroke="#888" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="8" y="105" font-size="10" fill="#888">boundary</text>
  <!-- Dense medium label -->
  <text x="30" y="190" font-size="11" fill="#2980b9">denser medium (n)</text>
  <!-- Less dense medium label -->
  <text x="30" y="35" font-size="11" fill="#888">air / vacuum (n₂ = 1)</text>
  <!-- Normal line -->
  <line x1="160" y1="20" x2="160" y2="200" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="163" y="18" font-size="10" fill="#aaa">normal</text>
  <!-- Incident ray (from lower left, hitting boundary at 160,110) -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <line x1="90" y1="185" x2="155" y2="115" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="75" y="200" font-size="11" fill="#c0392b">incident ray</text>
  <!-- Refracted ray along the boundary (90°) -->
  <line x1="160" y1="110" x2="300" y2="110" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="235" y="100" font-size="11" fill="#27ae60">refracted ray (90°)</text>
  <!-- Critical angle arc -->
  <path d="M160,110 m0,-30 a30,30 0 0,0 -21,21" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="127" y="88" font-size="11" fill="#333">θ_c</text>
  <!-- Formula -->
  <text x="160" y="210" text-anchor="middle" font-size="12" fill="#333">sin θ_c = 1/n  (or n₂/n₁)</text>
</svg>
