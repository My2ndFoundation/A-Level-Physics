<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" font-family="sans-serif">
  <rect width="300" height="300" fill="#f9f9f9" rx="6"/>
  <!-- Circle path -->
  <circle cx="150" cy="150" r="90" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Centre -->
  <circle cx="150" cy="150" r="4" fill="#555"/>
  <text x="158" y="154" font-size="11" fill="#555">centre</text>
  <!-- Object on circle (top right) -->
  <circle cx="214" cy="86" r="10" fill="#e67e22" stroke="#b05000" stroke-width="1.5"/>
  <!-- Tangent velocity arrow (upward-left tangent) -->
  <defs>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>
  <!-- Velocity tangent (perpendicular to radius, pointing ~upper left) -->
  <line x1="214" y1="86" x2="173" y2="50" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowV)"/>
  <text x="178" y="45" font-size="12" fill="#2980b9" font-style="italic">v</text>
  <text x="165" y="57" font-size="10" fill="#2980b9">(tangential)</text>
  <!-- Centripetal force arrow toward centre -->
  <line x1="214" y1="86" x2="165" y2="132" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowF)"/>
  <text x="202" y="128" font-size="12" fill="#c0392b" font-style="italic">F</text>
  <text x="190" y="142" font-size="10" fill="#c0392b">(centripetal)</text>
  <!-- Radius line -->
  <line x1="150" y1="150" x2="214" y2="86" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="173" y="130" font-size="11" fill="#888">r</text>
  <!-- Formula -->
  <text x="150" y="268" text-anchor="middle" font-size="12" fill="#333">F = mv²/r = mω²r</text>
  <text x="150" y="285" text-anchor="middle" font-size="10" fill="#888">directed toward centre; does no work</text>
</svg>
