<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" width="380" height="240" font-family="sans-serif">
  <rect width="380" height="240" fill="#f9f9f9" rx="8"/>
  <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Standing Wave — Fundamental (1st Harmonic)</text>
  <!-- Fixed ends represented by walls -->
  <rect x="20" y="50" width="8" height="120" fill="#888"/>
  <rect x="352" y="50" width="8" height="120" fill="#888"/>
  <!-- Equilibrium line -->
  <line x1="28" y1="110" x2="352" y2="110" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Standing wave curve — one half-wavelength loop -->
  <path d="M28,110 C80,30 260,30 352,110" fill="none" stroke="#2266cc" stroke-width="2.5"/>
  <!-- Anti-phase (below) dashed -->
  <path d="M28,110 C80,190 260,190 352,110" fill="none" stroke="#2266cc" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Node labels (ends) -->
  <text x="28" y="144" text-anchor="middle" fill="#cc2200" font-size="12" font-weight="bold">N</text>
  <text x="352" y="144" text-anchor="middle" fill="#cc2200" font-size="12" font-weight="bold">N</text>
  <!-- Antinode label (centre) -->
  <text x="190" y="44" text-anchor="middle" fill="#009922" font-size="12" font-weight="bold">AN</text>
  <!-- λ/2 annotation -->
  <line x1="28" y1="200" x2="352" y2="200" stroke="#555" stroke-width="1"/>
  <line x1="28" y1="195" x2="28" y2="205" stroke="#555" stroke-width="1"/>
  <line x1="352" y1="195" x2="352" y2="205" stroke="#555" stroke-width="1"/>
  <text x="190" y="216" text-anchor="middle" fill="#555" font-size="12">L = λ/2</text>
  <!-- Legend -->
  <text x="30" y="232" fill="#cc2200" font-size="11">N = node (zero amplitude)</text>
  <text x="220" y="232" fill="#009922" font-size="11">AN = antinode (max amplitude)</text>
</svg>
