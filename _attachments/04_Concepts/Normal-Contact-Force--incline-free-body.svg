<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <!-- Inclined plane -->
  <polygon points="20,220 280,220 280,140" fill="#dde" stroke="#555" stroke-width="2"/>
  <!-- Angle label -->
  <path d="M 260,220 A 20,20 0 0,0 260,202" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="243" y="215" fill="#555" font-size="12">θ</text>
  <!-- Block on slope -->
  <!-- Rotate ~18° to align with slope -->
  <g transform="translate(140,170) rotate(-18)">
    <rect x="-25" y="-20" width="50" height="40" fill="#cdf" stroke="#333" stroke-width="1.5" rx="3"/>
  </g>
  <!-- Weight arrow (vertically down from block) -->
  <line x1="140" y1="170" x2="140" y2="240" stroke="#e44" stroke-width="2.5"/>
  <polygon points="140,246 135,232 145,232" fill="#e44"/>
  <text x="148" y="240" fill="#e44" font-size="13">W = mg</text>
  <!-- Normal force (perpendicular to slope) — slope angle ~18°, so normal is ~(90+18)=108° from horizontal -->
  <!-- Normal direction: perpendicular to slope, pointing up-left -->
  <line x1="140" y1="170" x2="98" y2="104" stroke="#44e" stroke-width="2.5"/>
  <polygon points="96,100 94,116 106,112" fill="#44e"/>
  <text x="58" y="112" fill="#44e" font-size="13">N = mgcosθ</text>
  <!-- Component of weight along slope (friction context) -->
  <line x1="140" y1="170" x2="190" y2="186" stroke="#e80" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="192" y="196" fill="#e80" font-size="11">mgsinθ ∥ slope</text>
  <!-- Title -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Normal contact force on an inclined plane</text>
</svg>
