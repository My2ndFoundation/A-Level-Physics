<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 260" width="340" height="260" font-family="sans-serif" font-size="13">
  <!-- Bar magnet -->
  <rect x="110" y="110" width="120" height="40" fill="#ddf" stroke="#333" stroke-width="2" rx="4"/>
  <rect x="110" y="110" width="60" height="40" fill="#e44" stroke="#333" stroke-width="1" rx="4"/>
  <text x="127" y="135" fill="white" font-size="14" font-weight="bold">N</text>
  <rect x="170" y="110" width="60" height="40" fill="#44e" stroke="#333" stroke-width="1" rx="4"/>
  <text x="187" y="135" fill="white" font-size="14" font-weight="bold">S</text>
  <!-- Top curved field lines (N to S outside, arrowhead midway) -->
  <!-- Large arc top -->
  <path d="M 140 110 C 140 40, 200 40, 200 110" fill="none" stroke="#555" stroke-width="1.8"/>
  <polygon points="170,40 163,54 177,54" fill="#555"/>
  <!-- Medium arc top -->
  <path d="M 148 110 C 148 68, 192 68, 192 110" fill="none" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,66 164,78 176,78" fill="#555"/>
  <!-- Bottom curved field lines -->
  <path d="M 140 150 C 140 220, 200 220, 200 150" fill="none" stroke="#555" stroke-width="1.8"/>
  <polygon points="170,220 163,206 177,206" fill="#555"/>
  <path d="M 148 150 C 148 192, 192 192, 192 150" fill="none" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,192 164,180 176,180" fill="#555"/>
  <!-- Left external field line (wraps around) -->
  <path d="M 110 130 C 50 80, 50 180, 110 130" fill="none" stroke="#555" stroke-width="1.5"/>
  <polygon points="110,130 100,119 100,131" fill="#555"/>
  <!-- Right external field line (wraps around) -->
  <path d="M 230 130 C 290 80, 290 180, 230 130" fill="none" stroke="#555" stroke-width="1.5"/>
  <polygon points="230,130 240,120 240,131" fill="#555"/>
  <!-- Inside the magnet: field line from S to N (internal) -->
  <line x1="228" y1="130" x2="172" y2="130" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="168,130 180,125 180,135" fill="#555"/>
  <!-- Labels -->
  <text x="5" y="18" fill="#333" font-size="12" font-weight="bold">Magnetic field — bar magnet</text>
  <text x="5" y="248" fill="#555" font-size="11">Outside: N→S; Inside (dashed): S→N. Arrows show field direction.</text>
</svg>
