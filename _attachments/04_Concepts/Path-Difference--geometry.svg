<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220" font-family="sans-serif" font-size="13">
  <!-- Two coherent sources -->
  <circle cx="40" cy="90" r="6" fill="#e44"/>
  <text x="10" y="88" fill="#e44" font-size="13">S₁</text>
  <circle cx="40" cy="150" r="6" fill="#44c"/>
  <text x="10" y="148" fill="#44c" font-size="13">S₂</text>
  <!-- Point P (constructive, path diff = λ) -->
  <circle cx="310" cy="100" r="6" fill="#090"/>
  <text x="318" y="104" fill="#090" font-size="12">P</text>
  <!-- Rays -->
  <line x1="40" y1="90" x2="310" y2="100" stroke="#e44" stroke-width="1.5"/>
  <line x1="40" y1="150" x2="310" y2="100" stroke="#44c" stroke-width="1.5"/>
  <!-- Path from S1: label r1 -->
  <text x="145" y="82" fill="#e44" font-size="12">r₁</text>
  <!-- Path from S2: label r2 -->
  <text x="130" y="148" fill="#44c" font-size="12">r₂</text>
  <!-- Path difference bracket at S2 end -->
  <line x1="40" y1="90" x2="40" y2="150" stroke="#555" stroke-width="1.5"/>
  <!-- Perpendicular foot from S1 to S2-P ray (approximate) -->
  <circle cx="66" cy="104" r="3" fill="#555"/>
  <line x1="40" y1="90" x2="66" y2="104" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Path difference segment -->
  <line x1="40" y1="150" x2="66" y2="104" stroke="#c00" stroke-width="2.5"/>
  <text x="22" y="132" fill="#c00" font-size="12">Δx</text>
  <text x="22" y="145" fill="#c00" font-size="11">(path diff)</text>
  <!-- Angle theta at S2 -->
  <text x="50" y="152" fill="#555" font-size="12">θ</text>
  <!-- Formula at bottom -->
  <text x="40" y="190" fill="#333" font-size="13">Δx = d sinθ   →   nλ (constructive) or (n+½)λ (destructive)</text>
  <!-- Slit separation d -->
  <line x1="32" y1="90" x2="32" y2="150" stroke="#555" stroke-width="1"/>
  <text x="2" y="122" fill="#555" font-size="11">d</text>
  <!-- Title -->
  <text x="5" y="20" fill="#333" font-size="12" font-weight="bold">Path difference geometry (two coherent sources)</text>
</svg>
