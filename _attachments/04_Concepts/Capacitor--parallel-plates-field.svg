<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" font-family="sans-serif">
  <rect width="320" height="220" fill="#f9f9f9" rx="6"/>
  <!-- Left plate (+Q) -->
  <rect x="60" y="40" width="14" height="140" fill="#c0392b" rx="2"/>
  <text x="50" y="115" text-anchor="middle" font-size="16" fill="#c0392b">+</text>
  <text x="44" y="30" font-size="11" fill="#c0392b">+Q</text>
  <!-- Right plate (−Q) -->
  <rect x="246" y="40" width="14" height="140" fill="#2980b9" rx="2"/>
  <text x="268" y="115" text-anchor="middle" font-size="16" fill="#2980b9">−</text>
  <text x="262" y="30" font-size="11" fill="#2980b9">−Q</text>
  <!-- Electric field arrows between plates -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="84" y1="80" x2="238" y2="80" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="84" y1="110" x2="238" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="84" y1="140" x2="238" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- E label -->
  <text x="155" y="100" text-anchor="middle" font-size="13" fill="#333" font-style="italic">E</text>
  <!-- Distance d label -->
  <line x1="74" y1="190" x2="246" y2="190" stroke="#888" stroke-width="1"/>
  <line x1="74" y1="185" x2="74" y2="195" stroke="#888" stroke-width="1"/>
  <line x1="246" y1="185" x2="246" y2="195" stroke="#888" stroke-width="1"/>
  <text x="160" y="205" text-anchor="middle" font-size="11" fill="#888">separation d</text>
  <!-- Q=CV label -->
  <text x="160" y="20" text-anchor="middle" font-size="12" fill="#444">Q = CV,  C = εA/d</text>
</svg>
