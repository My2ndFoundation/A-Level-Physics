<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" font-family="sans-serif" font-size="13">
  <!-- Central mass -->
  <circle cx="150" cy="150" r="22" fill="#aad" stroke="#333" stroke-width="2"/>
  <text x="140" y="155" fill="#333" font-size="12" font-weight="bold">M</text>
  <!-- 8 radial field lines pointing inward, with arrowheads near the mass -->
  <!-- Right -->
  <line x1="280" y1="150" x2="176" y2="150" stroke="#e44" stroke-width="1.8"/>
  <polygon points="172,150 184,145 184,155" fill="#e44"/>
  <!-- Left -->
  <line x1="20" y1="150" x2="124" y2="150" stroke="#e44" stroke-width="1.8"/>
  <polygon points="128,150 116,145 116,155" fill="#e44"/>
  <!-- Down -->
  <line x1="150" y1="280" x2="150" y2="176" stroke="#e44" stroke-width="1.8"/>
  <polygon points="150,172 145,184 155,184" fill="#e44"/>
  <!-- Up -->
  <line x1="150" y1="20" x2="150" y2="124" stroke="#e44" stroke-width="1.8"/>
  <polygon points="150,128 145,116 155,116" fill="#e44"/>
  <!-- Diagonal NE → SW -->
  <line x1="257" y1="43" x2="166" y2="134" stroke="#e44" stroke-width="1.8"/>
  <polygon points="162,138 162,124 172,130" fill="#e44"/>
  <!-- Diagonal NW → SE -->
  <line x1="43" y1="43" x2="134" y2="134" stroke="#e44" stroke-width="1.8"/>
  <polygon points="138,138 128,130 138,124" fill="#e44"/>
  <!-- Diagonal SE → NW -->
  <line x1="257" y1="257" x2="166" y2="166" stroke="#e44" stroke-width="1.8"/>
  <polygon points="162,162 172,170 162,176" fill="#e44"/>
  <!-- Diagonal SW → NE -->
  <line x1="43" y1="257" x2="134" y2="166" stroke="#e44" stroke-width="1.8"/>
  <polygon points="138,162 138,176 128,170" fill="#e44"/>
  <!-- Labels -->
  <text x="5" y="20" fill="#333" font-size="12" font-weight="bold">Radial gravitational field</text>
  <text x="5" y="290" fill="#555" font-size="11">Field lines point inward toward M; spacing shows field strength.</text>
</svg>
