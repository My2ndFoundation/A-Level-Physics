<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280" font-family="sans-serif">
  <rect width="380" height="280" fill="#f9f9f9" rx="8"/>
  <text x="190" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Total Internal Reflection</text>
  <!-- Boundary line (horizontal) -->
  <line x1="20" y1="140" x2="360" y2="140" stroke="#555" stroke-width="2"/>
  <!-- Dense medium label -->
  <text x="30" y="175" fill="#2266cc" font-size="12">dense medium (n₁)</text>
  <!-- Less dense medium label -->
  <text x="30" y="125" fill="#888" font-size="12">less dense (n₂)</text>
  <!-- CASE 1: below critical angle — refraction occurs -->
  <!-- Incident ray (from below-left to boundary at x=95) -->
  <line x1="50" y1="230" x2="95" y2="140" stroke="#2266cc" stroke-width="2" marker-end="url(#arr1)"/>
  <!-- Normal at x=95 -->
  <line x1="95" y1="90" x2="95" y2="190" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Refracted ray (bending away from normal — exits at larger angle) -->
  <line x1="95" y1="140" x2="125" y2="80" stroke="#cc8800" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <!-- Partial reflected ray -->
  <line x1="95" y1="140" x2="50" y2="90" stroke="#2266cc" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr1)"/>
  <text x="70" y="244" text-anchor="middle" fill="#555" font-size="10">θ &lt; θc</text>
  <!-- CASE 2: at critical angle — refracted ray along boundary -->
  <!-- Incident ray -->
  <line x1="130" y1="240" x2="190" y2="140" stroke="#2266cc" stroke-width="2" marker-end="url(#arr1)"/>
  <!-- Normal at x=190 -->
  <line x1="190" y1="90" x2="190" y2="190" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Refracted along boundary -->
  <line x1="190" y1="140" x2="280" y2="140" stroke="#cc8800" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="160" y="254" text-anchor="middle" fill="#555" font-size="10">θ = θc</text>
  <!-- CASE 3: beyond critical angle — TIR -->
  <!-- Incident ray -->
  <line x1="245" y1="240" x2="290" y2="140" stroke="#2266cc" stroke-width="2" marker-end="url(#arr1)"/>
  <!-- Normal at x=290 -->
  <line x1="290" y1="90" x2="290" y2="200" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Totally reflected ray -->
  <line x1="290" y1="140" x2="340" y2="230" stroke="#cc2200" stroke-width="2.5" marker-end="url(#arr3)"/>
  <text x="290" y="254" text-anchor="middle" fill="#cc2200" font-size="10" font-weight="bold">θ &gt; θc  TIR</text>
  <!-- Defs -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2266cc"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc8800"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc2200"/>
    </marker>
  </defs>
</svg>
