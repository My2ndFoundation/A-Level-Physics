<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 956" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    :root{
      --bg:#ffffff;--panel:#f3f5f8;--ink:#1f2933;--muted:#5a6675;--edge:#8895a5;
      --c1:#2563eb;--c1b:#dbeafe;--c2:#0891b2;--c2b:#cffafe;
      --c3:#7c3aed;--c3b:#ede9fe;--c5:#059669;--c5b:#d6f3e7;--c6:#d97706;--c6b:#fef0d6;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1b1d22;--panel:#24272f;--ink:#e8eaed;--muted:#9aa5b1;--edge:#566072;
        --c1:#60a5fa;--c1b:#1d3354;--c2:#22d3ee;--c2b:#0e3a44;
        --c3:#a78bfa;--c3b:#332457;--c5:#34d399;--c5b:#0f3d2e;--c6:#fbbf24;--c6b:#3f2f0c;
      }
    }
    .ink{fill:var(--ink)} .muted{fill:var(--muted)}
    .title{font-size:22px;font-weight:700}
    .tier{font-size:11px;font-weight:700;fill:var(--muted);letter-spacing:.08em}
    .st{font-size:13px;font-weight:700;fill:var(--muted);letter-spacing:.04em}
    .li{font-size:12.5px;fill:var(--ink)}
    .ls{font-size:11px;fill:var(--muted)}
    .edge{stroke:var(--edge);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--edge)"/>
    </marker>
  </defs>
  <rect width="1000" height="956" fill="var(--bg)"/>
  <!-- body -->
  <text x="40" y="38" class="title ink">Circular Motion MOC — knowledge flow</text>
  <text x="40" y="60" class="tier">EVERY PAGE SITS ON THIS FLOW AND LINKS ALONG IT</text>

  <line x1="190" y1="119" x2="190" y2="873" class="edge" marker-end="url(#ah)"/>

  <!-- band 1 foundation -->
  <line x1="190" y1="119" x2="200" y2="119" class="edge"/>
  <rect x="200" y="92" width="760" height="54" rx="12" fill="var(--c1b)" stroke="var(--c1)"/>
  <text x="180" y="123" text-anchor="end" class="st">foundation</text>
  <text x="216" y="123" class="li">From-Weight-to-Gravitational-Field-Strength</text>

  <!-- band 2 everyday intuition -->
  <line x1="190" y1="187" x2="200" y2="187" class="edge"/>
  <rect x="200" y="160" width="760" height="54" rx="12" fill="var(--c2b)" stroke="var(--c2)"/>
  <text x="180" y="191" text-anchor="end" class="st">everyday intuition</text>
  <text x="216" y="191" class="li">Why-Objects-Keep-Moving-in-Space</text>

  <!-- band 3 physical quantity -->
  <line x1="190" y1="255" x2="200" y2="255" class="edge"/>
  <rect x="200" y="228" width="760" height="54" rx="12" fill="var(--c3b)" stroke="var(--c3)"/>
  <text x="180" y="259" text-anchor="end" class="st">physical quantity</text>
  <text x="216" y="259" class="li">Period, Frequency, Velocity, Acceleration, Force, Angular-Velocity …</text>

  <!-- band 4 concept -->
  <line x1="190" y1="323" x2="200" y2="323" class="edge"/>
  <rect x="200" y="296" width="760" height="54" rx="12" fill="var(--c5b)" stroke="var(--c5)"/>
  <text x="180" y="327" text-anchor="end" class="st">concept</text>
  <text x="216" y="327" class="li">Circular-Motion, Centripetal-Force, Radian, Resultant-Force, Orbital-Motion</text>

  <!-- band 5 law / result -->
  <line x1="190" y1="391" x2="200" y2="391" class="edge"/>
  <rect x="200" y="364" width="760" height="54" rx="12" fill="var(--c6b)" stroke="var(--c6)"/>
  <text x="180" y="395" text-anchor="end" class="st">law / result</text>
  <text x="216" y="395" class="li">Newton-Second-Law, Newtons-Law-of-Gravitation</text>

  <!-- band 6 model -->
  <line x1="190" y1="459" x2="200" y2="459" class="edge"/>
  <rect x="200" y="432" width="760" height="54" rx="12" fill="var(--c1b)" stroke="var(--c1)"/>
  <text x="180" y="463" text-anchor="end" class="st">model</text>
  <text x="216" y="463" class="li">Point-Mass-Model, Free-Body-Model</text>

  <!-- band 7 method -->
  <line x1="190" y1="527" x2="200" y2="527" class="edge"/>
  <rect x="200" y="500" width="760" height="54" rx="12" fill="var(--c2b)" stroke="var(--c2)"/>
  <text x="180" y="531" text-anchor="end" class="st">method</text>
  <text x="216" y="531" class="li">Solving-Circular-Motion-Problems, Resolving-Forces, Applying-Newton-Second-Law</text>

  <!-- band 8 representation -->
  <line x1="190" y1="595" x2="200" y2="595" class="edge"/>
  <rect x="200" y="568" width="760" height="54" rx="12" fill="var(--c3b)" stroke="var(--c3)"/>
  <text x="180" y="599" text-anchor="end" class="st">representation</text>
  <text x="216" y="599" class="li">Free-Body-Diagram</text>

  <!-- band 9 application -->
  <line x1="190" y1="663" x2="200" y2="663" class="edge"/>
  <rect x="200" y="636" width="760" height="54" rx="12" fill="var(--c5b)" stroke="var(--c5)"/>
  <text x="180" y="667" text-anchor="end" class="st">application</text>
  <text x="216" y="667" class="li">Banked-Tracks-and-Centrifuges, Satellites-and-Geostationary-Orbits, Stars-and-Cosmology, Particle-Accelerators</text>

  <!-- band 10 problem type -->
  <line x1="190" y1="731" x2="200" y2="731" class="edge"/>
  <rect x="200" y="704" width="760" height="54" rx="12" fill="var(--c6b)" stroke="var(--c6)"/>
  <text x="180" y="735" text-anchor="end" class="st">problem type</text>
  <text x="216" y="735" class="li">Circular-Motion-Problem, Worked-Circular-Motion-Conical-Pendulum</text>

  <!-- band 11 mistake pattern -->
  <line x1="190" y1="799" x2="200" y2="799" class="edge"/>
  <rect x="200" y="772" width="760" height="54" rx="12" fill="var(--c1b)" stroke="var(--c1)"/>
  <text x="180" y="803" text-anchor="end" class="st">mistake pattern</text>
  <text x="216" y="803" class="li">Confusing-Angular-and-Linear-Quantities, Forgetting-Resultant-Force, Treating-Centripetal-Force-as-an-Extra-Force …</text>

  <!-- band 12 frontier edge -->
  <line x1="190" y1="867" x2="200" y2="867" class="edge"/>
  <rect x="200" y="840" width="760" height="54" rx="12" fill="var(--c2b)" stroke="var(--c2)" stroke-dasharray="6 4"/>
  <text x="180" y="871" text-anchor="end" class="st">frontier edge</text>
  <text x="216" y="871" class="li">Cosmology-Map, Relativity-Map</text>

  <text x="500" y="928" text-anchor="middle" class="ls">Circular motion from "why things keep moving" through angular quantities and centripetal force to orbits, accelerators and the cosmology edge.</text>
</svg>
