<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 344" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    :root{
      --bg:#ffffff;--panel:#f3f5f8;--ink:#1f2933;--muted:#5a6675;--edge:#8895a5;
      --c1:#2563eb;--c1b:#dbeafe;--c2:#0891b2;--c2b:#cffafe;
      --c3:#7c3aed;--c3b:#ede9fe;--c5:#059669;--c5b:#d6f3e7;--c6:#d97706;--c6b:#fef0d6;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1b1d22;--panel:#24272f;--ink:#e8eaed;--muted:#9aa5b1;--edge:#566072;
        --c1:#60a5fa;--c1b:#1d3354;--c2:#22d3ee;--c2b:#0e3a44;
        --c3:#a78bfa;--c3b:#332457;--c5:#34d399;--c5b:#0f3d2e;--c6:#fbbf24;--c6b:#3f2f0c;
      }
    }
    .ink{fill:var(--ink)} .muted{fill:var(--muted)}
    .title{font-size:22px;font-weight:700}
    .tier{font-size:11px;font-weight:700;fill:var(--muted);letter-spacing:.08em}
    .st{font-size:13px;font-weight:700;fill:var(--muted);letter-spacing:.04em}
    .li{font-size:12.5px;fill:var(--ink)}
    .ls{font-size:11px;fill:var(--muted)}
    .edge{stroke:var(--edge);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--edge)"/>
    </marker>
  </defs>
  <rect width="1000" height="344" fill="var(--bg)"/>
  <!-- body -->
  <text x="40" y="38" class="title ink">Particles MOC — knowledge flow</text>
  <text x="40" y="60" class="tier">EVERY PAGE SITS ON THIS FLOW AND LINKS ALONG IT</text>

  <!-- spine -->
  <path class="edge" d="M190 119 L190 255" marker-end="url(#ah)"/>

  <!-- band 1: concept -->
  <line class="edge" x1="190" y1="119" x2="200" y2="119"/>
  <rect x="200" y="92" width="760" height="54" rx="12" fill="var(--c1b)" stroke="var(--c1)"/>
  <text x="180" y="123" text-anchor="end" class="st">concept</text>
  <text x="216" y="123" class="li">Fundamental-Particles, Quarks, Leptons, The-Standard-Model, Antiparticles, The-Nuclear-Atom …</text>

  <!-- band 2: application -->
  <line class="edge" x1="190" y1="187" x2="200" y2="187"/>
  <rect x="200" y="160" width="760" height="54" rx="12" fill="var(--c2b)" stroke="var(--c2)"/>
  <text x="180" y="191" text-anchor="end" class="st">application</text>
  <text x="216" y="191" class="li">Particle-Accelerators</text>

  <!-- band 3: frontier edge -->
  <line class="edge" x1="190" y1="255" x2="200" y2="255"/>
  <rect x="200" y="228" width="760" height="54" rx="12" fill="var(--c3b)" stroke="var(--c3)" stroke-dasharray="6 4"/>
  <text x="180" y="259" text-anchor="end" class="st">frontier edge</text>
  <text x="216" y="259" class="li">Particle-Physics-Map</text>

  <text x="500" y="312" text-anchor="middle" class="ls">Quarks and leptons of the Standard Model lead to accelerators and the frontier.</text>
</svg>
