<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    :root{
      --bg:#ffffff;--panel:#f3f5f8;--ink:#1f2933;--muted:#5a6675;--edge:#8895a5;
      --c1:#2563eb;--c1b:#dbeafe;--c2:#0891b2;--c2b:#cffafe;
      --c3:#7c3aed;--c3b:#ede9fe;--c5:#059669;--c5b:#d6f3e7;--c6:#d97706;--c6b:#fef0d6;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1b1d22;--panel:#24272f;--ink:#e8eaed;--muted:#9aa5b1;--edge:#566072;
        --c1:#60a5fa;--c1b:#1d3354;--c2:#22d3ee;--c2b:#0e3a44;
        --c3:#a78bfa;--c3b:#332457;--c5:#34d399;--c5b:#0f3d2e;--c6:#fbbf24;--c6b:#3f2f0c;
      }
    }
    .ink{fill:var(--ink)} .muted{fill:var(--muted)}
    .title{font-size:22px;font-weight:700}
    .tier{font-size:11px;font-weight:700;fill:var(--muted);letter-spacing:.08em}
    .st{font-size:13px;font-weight:700;fill:var(--muted);letter-spacing:.04em}
    .pt{font-size:14px;font-weight:700;fill:var(--ink)}
    .li{font-size:12.5px;fill:var(--ink)}
    .ls{font-size:11px;fill:var(--muted)}
    .edge{stroke:var(--edge);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--edge)"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="var(--bg)"/>
  <!-- body -->
  <text class="title ink" x="40" y="38">Foundations MOC — where this layer sits</text>
  <text class="tier" x="40" y="60">PHYSICS AS ONE CONTINUOUS SYSTEM</text>

  <!-- upward arrow through stack -->
  <line x1="62" y1="540" x2="62" y2="92" class="edge" marker-end="url(#ah)"/>

  <!-- stack bottom -> top -->
  <!-- Frontier edge (top, dashed) -->
  <rect x="90" y="86" width="520" height="52" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-dasharray="6 4"/>
  <text class="pt muted" x="106" y="118">Frontier edge</text>
  <!-- A-Level core -->
  <rect x="90" y="150" width="520" height="52" rx="12" fill="var(--panel)" stroke="var(--edge)"/>
  <text class="pt" x="106" y="182">A-Level OCR H556 core</text>
  <!-- Bridge -->
  <rect x="90" y="214" width="520" height="52" rx="12" fill="var(--panel)" stroke="var(--edge)"/>
  <text class="pt" x="106" y="246">Bridge to A-Level</text>
  <!-- GCSE foundation -->
  <rect x="90" y="278" width="520" height="52" rx="12" fill="var(--panel)" stroke="var(--edge)"/>
  <text class="pt" x="106" y="310">GCSE foundation</text>
  <!-- Pre-GCSE -->
  <rect x="90" y="342" width="520" height="52" rx="12" fill="var(--panel)" stroke="var(--edge)"/>
  <text class="pt" x="106" y="374">Pre-GCSE</text>
  <!-- Everyday (this MOC spans foundation layers, highlight everyday->bridge band) -->
  <rect x="90" y="406" width="520" height="52" rx="12" fill="var(--c3b)" stroke="var(--c3)" stroke-width="2.5"/>
  <text class="pt" x="106" y="438">Everyday  ◀ this MOC: everyday → bridge</text>

  <!-- right panel -->
  <rect x="640" y="86" width="320" height="372" rx="12" fill="var(--c3b)" stroke="var(--c3)" stroke-width="1.2"/>
  <text class="st" x="658" y="112">FOUNDATIONS</text>
  <text class="li" x="658" y="134">Force, Energy, Power, Atoms</text>
  <text class="li" x="658" y="154">From Speed to Velocity</text>
  <text class="li" x="658" y="174">From Distance to Displacement</text>
  <text class="li" x="658" y="194">Weight → Gravitational Field …</text>
  <text class="st" x="658" y="226">QUANTITIES</text>
  <text class="li" x="658" y="248">Acceleration, Speed, Velocity</text>
  <text class="li" x="658" y="268">Mass, Weight, Density, Charge</text>
  <text class="li" x="658" y="288">Current, Potential Difference …</text>
  <text class="st" x="658" y="320">CONCEPTS</text>
  <text class="li" x="658" y="342">Atomic Structure, States of Matter</text>
  <text class="li" x="658" y="362">Vectors and Scalars, SI Units</text>
  <text class="li" x="658" y="382">Electromagnetic Spectrum</text>
  <text class="st" x="658" y="414">COMMON-SENSE</text>
  <text class="li" x="658" y="436">Why Seatbelts Matter, Why Ice Floats …</text>

  <text class="ls" x="500" y="510" text-anchor="middle">Foundations span everyday intuition through the bridge — the runway feeding the A-Level core above.</text>
  <text class="ls" x="500" y="566" text-anchor="middle">Foundations MOC: prerequisite ideas that make the A-Level graph make sense.</text>
</svg>
