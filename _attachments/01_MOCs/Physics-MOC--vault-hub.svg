<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    :root{
      --bg:#ffffff;--panel:#f3f5f8;--ink:#1f2933;--muted:#5a6675;--edge:#8895a5;
      --c1:#2563eb;--c1b:#dbeafe;--c2:#0891b2;--c2b:#cffafe;
      --c3:#7c3aed;--c3b:#ede9fe;--c5:#059669;--c5b:#d6f3e7;--c6:#d97706;--c6b:#fef0d6;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1b1d22;--panel:#24272f;--ink:#e8eaed;--muted:#9aa5b1;--edge:#566072;
        --c1:#60a5fa;--c1b:#1d3354;--c2:#22d3ee;--c2b:#0e3a44;
        --c3:#a78bfa;--c3b:#332457;--c5:#34d399;--c5b:#0f3d2e;--c6:#fbbf24;--c6b:#3f2f0c;
      }
    }
    .ink{fill:var(--ink)} .muted{fill:var(--muted)}
    .title{font-size:22px;font-weight:700}
    .tier{font-size:11px;font-weight:700;fill:var(--muted);letter-spacing:.08em}
    .st{font-size:13px;font-weight:700;fill:var(--muted);letter-spacing:.04em}
    .pt{font-size:14px;font-weight:700;fill:var(--ink)}
    .li{font-size:12.5px;fill:var(--ink)}
    .ls{font-size:11px;fill:var(--muted)}
    .edge{stroke:var(--edge);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--edge)"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="var(--bg)"/>
  <!-- body -->
  <text x="40" y="38" class="title ink">Physics MOC — the master map</text>
  <text x="40" y="60" class="tier">LAYERS · TOPICS · SKILLS · FRONTIER</text>

  <!-- connectors centre -> panels -->
  <path class="edge" d="M500 132 L240 192" marker-end="url(#ah)"/>
  <path class="edge" d="M500 132 L760 192" marker-end="url(#ah)"/>
  <path class="edge" d="M500 165 L240 392" marker-end="url(#ah)"/>
  <path class="edge" d="M500 165 L760 392" marker-end="url(#ah)"/>

  <!-- central node -->
  <rect x="410" y="86" width="180" height="64" rx="12" fill="var(--c3b)" stroke="var(--c3)" stroke-width="2.5"/>
  <text x="500" y="124" text-anchor="middle" class="pt">Physics MOC</text>

  <!-- panel: Learning Layers -->
  <rect x="40" y="184" width="420" height="170" rx="12" fill="var(--c1b)" stroke="var(--c1)"/>
  <text x="60" y="210" class="pt">Learning Layers</text>
  <text x="60" y="234" class="li">Foundations-MOC, Everyday-Physics-MOC</text>
  <text x="60" y="256" class="li">Pre-GCSE-Foundations-MOC</text>
  <text x="60" y="278" class="li">GCSE-Foundations-MOC</text>
  <text x="60" y="300" class="li">Bridge-to-A-Level-MOC</text>
  <text x="60" y="334" class="ls">Everyday intuition → GCSE → bridge → A-Level core.</text>

  <!-- panel: Topic MOCs -->
  <rect x="540" y="184" width="420" height="170" rx="12" fill="var(--c2b)" stroke="var(--c2)"/>
  <text x="560" y="210" class="pt">Topic MOCs</text>
  <text x="560" y="234" class="li">Mechanics, Motion, Forces, Energy, Circular-Motion …</text>
  <text x="560" y="256" class="li">Materials, Electricity, Circuits, Waves</text>
  <text x="560" y="278" class="li">Quantum-Physics, Fields, Thermal-Physics</text>
  <text x="560" y="300" class="li">Nuclear-Physics, Particles, Astrophysics …</text>
  <text x="560" y="334" class="ls">17 examinable topic maps across H556.</text>

  <!-- panel: Skills & Practice -->
  <rect x="40" y="384" width="420" height="150" rx="12" fill="var(--c5b)" stroke="var(--c5)"/>
  <text x="60" y="410" class="pt">Skills &amp; Practice</text>
  <text x="60" y="434" class="li">Physical-Quantities-MOC</text>
  <text x="60" y="456" class="li">Mathematical-Methods-in-Physics-MOC</text>
  <text x="60" y="478" class="li">Practical-Skills-MOC, Problem-Solving-MOC</text>
  <text x="60" y="500" class="li">Mistake-Patterns-MOC</text>

  <!-- panel: Frontier -->
  <rect x="540" y="384" width="420" height="150" rx="12" fill="var(--c6b)" stroke="var(--c6)" stroke-dasharray="6 4"/>
  <text x="560" y="410" class="pt">Frontier</text>
  <text x="560" y="434" class="li">Frontier-Physics-MOC, Modern-Physics-MOC</text>
  <text x="560" y="456" class="li">Quantum-Mechanics-Map, Relativity-Map</text>
  <text x="560" y="478" class="li">Particle-Physics-Map, Cosmology-Map</text>
  <text x="560" y="500" class="li">Semiconductor-Physics-Map, Quantum-Computing-Map …</text>

  <text x="500" y="552" text-anchor="middle" class="ls">One hub linking the learning layers, topic maps, skill maps and the frontier.</text>
</svg>
