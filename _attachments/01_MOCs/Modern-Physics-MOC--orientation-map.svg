<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    :root{
      --bg:#ffffff;--panel:#f3f5f8;--ink:#1f2933;--muted:#5a6675;--edge:#8895a5;
      --c1:#2563eb;--c1b:#dbeafe;--c2:#0891b2;--c2b:#cffafe;
      --c3:#7c3aed;--c3b:#ede9fe;--c5:#059669;--c5b:#d6f3e7;--c6:#d97706;--c6b:#fef0d6;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#1b1d22;--panel:#24272f;--ink:#e8eaed;--muted:#9aa5b1;--edge:#566072;
        --c1:#60a5fa;--c1b:#1d3354;--c2:#22d3ee;--c2b:#0e3a44;
        --c3:#a78bfa;--c3b:#332457;--c5:#34d399;--c5b:#0f3d2e;--c6:#fbbf24;--c6b:#3f2f0c;
      }
    }
    .ink{fill:var(--ink)} .muted{fill:var(--muted)}
    .title{font-size:22px;font-weight:700}
    .tier{font-size:11px;font-weight:700;fill:var(--muted);letter-spacing:.08em}
    .st{font-size:13px;font-weight:700;fill:var(--muted);letter-spacing:.04em}
    .pt{font-size:14px;font-weight:700;fill:var(--ink)}
    .li{font-size:12.5px;fill:var(--ink)}
    .ls{font-size:11px;fill:var(--muted)}
    .edge{stroke:var(--edge);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="var(--edge)"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="var(--bg)"/>
  <!-- body -->
  <text x="40" y="38" class="title ink">Modern Physics MOC — orientation map</text>
  <text x="40" y="60" class="tier">WHERE A-LEVEL IDEAS LEAD BEYOND THE SYLLABUS</text>

  <text x="60" y="92" class="st">A-LEVEL ENTRY POINTS</text>
  <text x="700" y="92" class="st">FRONTIER MAPS (PERIPHERAL)</text>

  <!-- left: A-Level entry-point clusters -->
  <rect x="60" y="108" width="320" height="100" rx="12" fill="var(--c1b)" stroke="var(--c1)" stroke-width="1.6"/>
  <text x="80" y="132" class="pt">Quantum</text>
  <text x="80" y="154" class="li">Photoelectric-Effect, Photon-Model,</text>
  <text x="80" y="174" class="li">Wave-Particle-Duality, Energy-Levels,</text>
  <text x="80" y="194" class="li">De-Broglie-Equation, Work-Function …</text>

  <rect x="60" y="222" width="320" height="100" rx="12" fill="var(--c1b)" stroke="var(--c1)" stroke-width="1.6"/>
  <text x="80" y="246" class="pt">Nuclear &amp; particle</text>
  <text x="80" y="268" class="li">The-Nuclear-Atom, Radioactive-Decay,</text>
  <text x="80" y="288" class="li">Binding-Energy, Quarks, Leptons,</text>
  <text x="80" y="308" class="li">The-Standard-Model, Nuclear-Fusion …</text>

  <rect x="60" y="336" width="320" height="92" rx="12" fill="var(--c1b)" stroke="var(--c1)" stroke-width="1.6"/>
  <text x="80" y="360" class="pt">Astrophysics</text>
  <text x="80" y="382" class="li">Stellar-Evolution, Hubbles-Law,</text>
  <text x="80" y="402" class="li">Redshift, Big-Bang-Theory,</text>
  <text x="80" y="421" class="li">Hertzsprung-Russell-Diagram</text>

  <!-- dashed connectors -->
  <path class="edge" stroke-dasharray="6 4" d="M380 150 C 520 150 520 134 638 134" marker-end="url(#ah)"/>
  <path class="edge" stroke-dasharray="6 4" d="M380 170 C 520 170 520 252 638 252" marker-end="url(#ah)"/>
  <path class="edge" stroke-dasharray="6 4" d="M380 272 C 520 272 520 193 638 193" marker-end="url(#ah)"/>
  <path class="edge" stroke-dasharray="6 4" d="M380 290 C 520 290 520 311 638 311" marker-end="url(#ah)"/>
  <path class="edge" stroke-dasharray="6 4" d="M380 382 C 520 382 520 370 638 370" marker-end="url(#ah)"/>
  <path class="edge" stroke-dasharray="6 4" d="M380 150 C 520 150 520 429 638 429" marker-end="url(#ah)"/>

  <!-- right: frontier map nodes (dashed peripheral) -->
  <rect x="640" y="112" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="139" class="li muted">Quantum-Mechanics-Map</text>
  <rect x="640" y="171" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="198" class="li muted">Relativity-Map</text>
  <rect x="640" y="230" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="257" class="li muted">Particle-Physics-Map</text>
  <rect x="640" y="289" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="316" class="li muted">Semiconductor-Physics-Map</text>
  <rect x="640" y="348" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="375" class="li muted">Cosmology-Map</text>
  <rect x="640" y="407" width="300" height="44" rx="12" fill="var(--panel)" stroke="var(--edge)" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="660" y="434" class="li muted">Quantum-Computing-Map</text>

  <text x="500" y="510" text-anchor="middle" class="ls">Orientation only — maps, not mastery. Frontier pages stay shallow (project rule §3).</text>
</svg>
