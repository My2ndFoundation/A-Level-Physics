<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260" font-family="sans-serif" font-size="13">
  <!-- Wire (horizontal, carrying current left to right) -->
  <rect x="80" y="118" width="260" height="24" fill="#d4a820" rx="4" stroke="#a07800" stroke-width="1.5"/>
  <text x="185" y="134" fill="#5c3b00" font-weight="bold" font-size="12">current I →</text>
  <!-- Magnetic field arrows (into page cross symbols) -->
  <text x="60"  y="90" fill="#333" font-size="20">×</text>
  <text x="130" y="90" fill="#333" font-size="20">×</text>
  <text x="200" y="90" fill="#333" font-size="20">×</text>
  <text x="270" y="90" fill="#333" font-size="20">×</text>
  <text x="340" y="90" fill="#333" font-size="20">×</text>
  <text x="60"  y="170" fill="#333" font-size="20">×</text>
  <text x="130" y="170" fill="#333" font-size="20">×</text>
  <text x="200" y="170" fill="#333" font-size="20">×</text>
  <text x="270" y="170" fill="#333" font-size="20">×</text>
  <text x="340" y="170" fill="#333" font-size="20">×</text>
  <text x="200" y="220" fill="#555" font-size="12">B field into page</text>
  <!-- Force arrow (upward) -->
  <line x1="210" y1="115" x2="210" y2="50" stroke="#cc2222" stroke-width="3" marker-end="url(#arrowF)"/>
  <text x="215" y="45" fill="#cc2222" font-weight="bold">F (force, upward)</text>
  <!-- Labels -->
  <text x="10" y="82" fill="#333" font-size="12">Field B</text>
  <!-- Fleming LHR reminder -->
  <text x="8" y="248" fill="#555" font-size="11">Fleming's left-hand rule: thumb=Force, index=Field, middle=Current</text>
  <!-- Equation -->
  <text x="8" y="15" fill="#333" font-size="14" font-weight="bold">F = BIL sin θ</text>
  <defs>
    <marker id="arrowF" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc2222"/>
    </marker>
  </defs>
</svg>
