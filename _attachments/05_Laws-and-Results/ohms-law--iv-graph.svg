<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <!-- Axes -->
  <line x1="50" y1="220" x2="290" y2="220" stroke="#333" stroke-width="2" marker-end="url(#ax)"/>
  <line x1="50" y1="220" x2="50" y2="30" stroke="#333" stroke-width="2" marker-end="url(#ay)"/>
  <!-- Axis labels -->
  <text x="280" y="240" fill="#333">V (V)</text>
  <text x="10" y="30" fill="#333">I (A)</text>
  <text x="130" y="255" fill="#333">Potential Difference</text>
  <!-- Ohmic line (straight through origin) -->
  <line x1="50" y1="220" x2="270" y2="60" stroke="#2266cc" stroke-width="2.5"/>
  <text x="240" y="56" fill="#2266cc" font-weight="bold">Ohmic</text>
  <!-- Gradient label -->
  <text x="130" y="130" fill="#2266cc" font-size="11">gradient = 1/R</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="ax" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
  <!-- Equation -->
  <text x="55" y="20" fill="#333" font-size="14" font-weight="bold">V = IR</text>
  <!-- Origin label -->
  <text x="35" y="235" fill="#333">O</text>
</svg>
