<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" font-family="sans-serif" font-size="13">
  <!-- Medium labels -->
  <rect x="0" y="0" width="400" height="155" fill="#e8f4fc" rx="0"/>
  <rect x="0" y="155" width="400" height="145" fill="#c8e0f4" rx="0"/>
  <text x="12" y="30" fill="#2255aa" font-size="14">Medium 1 (n₁)</text>
  <text x="12" y="220" fill="#114488" font-size="14" font-weight="bold">Medium 2 (n₂ &gt; n₁)</text>
  <!-- Boundary -->
  <line x1="0" y1="155" x2="400" y2="155" stroke="#557799" stroke-width="2.5"/>
  <!-- Normal (dashed) -->
  <line x1="200" y1="20" x2="200" y2="285" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="207" y="18" fill="#555">Normal</text>
  <!-- Incident ray -->
  <line x1="80" y1="50" x2="200" y2="155" stroke="#2266cc" stroke-width="2.5" marker-end="url(#arrowI)"/>
  <!-- Refracted ray (bends toward normal) -->
  <line x1="200" y1="155" x2="270" y2="285" stroke="#228833" stroke-width="2.5" marker-end="url(#arrowT)"/>
  <!-- θ₁ arc -->
  <path d="M 200 155 m 0 -55 a 55 55 0 0 0 -42 -36" fill="none" stroke="#2266cc" stroke-width="1.3"/>
  <text x="132" y="110" fill="#2266cc">θ₁</text>
  <!-- θ₂ arc -->
  <path d="M 200 155 m 0 55 a 55 55 0 0 1 26 48" fill="none" stroke="#228833" stroke-width="1.3"/>
  <text x="230" y="215" fill="#228833">θ₂</text>
  <!-- Labels -->
  <text x="40" y="45" fill="#2266cc" font-weight="bold">Incident ray</text>
  <text x="245" y="285" fill="#228833" font-weight="bold">Refracted ray</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowI" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2266cc"/>
    </marker>
    <marker id="arrowT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#228833"/>
    </marker>
  </defs>
  <!-- Equation -->
  <text x="100" y="298" fill="#333" font-size="14" font-weight="bold">n₁ sin θ₁ = n₂ sin θ₂</text>
</svg>
