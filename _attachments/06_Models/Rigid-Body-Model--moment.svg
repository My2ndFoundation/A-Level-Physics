<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="340" height="240" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="340" height="240" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="170" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Rigid Body: Moment of a Force</text>

  <!-- Beam (horizontal rod) -->
  <rect x="40" y="108" width="260" height="14" rx="3" fill="#b0b8cc" stroke="#5060a0" stroke-width="1.5"/>

  <!-- Pivot triangle at x=120 -->
  <polygon points="120,122 104,148 136,148" fill="#666" stroke="#333" stroke-width="1"/>
  <line x1="100" y1="148" x2="140" y2="148" stroke="#333" stroke-width="2"/>

  <!-- Force F1 (downward at right, x=260) -->
  <line x1="260" y1="108" x2="260" y2="60" stroke="#e04040" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <text x="270" y="80" fill="#e04040">F₁ ↑</text>

  <!-- Force F2 (downward at far right, x=290) - acts downward -->
  <!-- Actually let's show downward force on right -->
  <line x1="280" y1="122" x2="280" y2="172" stroke="#c04000" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="286" y="170" fill="#c04000">F₂ ↓</text>

  <!-- Perpendicular distance d1 from pivot to F1 -->
  <!-- d1 = 260 - 120 = 140 px (scaled) -->
  <line x1="120" y1="155" x2="260" y2="155" stroke="#3366cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="190" y="168" text-anchor="middle" fill="#3366cc" font-size="11">d₁</text>
  <!-- Small perp indicator at F1 bottom -->
  <rect x="254" y="149" width="6" height="6" fill="none" stroke="#3366cc" stroke-width="1"/>

  <!-- Perpendicular distance d2 from pivot to F2 -->
  <line x1="120" y1="175" x2="280" y2="175" stroke="#2aa844" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="188" text-anchor="middle" fill="#2aa844" font-size="11">d₂</text>
  <rect x="274" y="169" width="6" height="6" fill="none" stroke="#2aa844" stroke-width="1"/>

  <!-- Moment equation -->
  <text x="170" y="208" text-anchor="middle" fill="#333" font-size="12">M = F × d  (perpendicular distance)</text>
  <text x="170" y="226" text-anchor="middle" fill="#555" font-size="11">Equilibrium: F₁d₁ (acw) = F₂d₂ (cw)</text>

  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e04040"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c04000"/>
    </marker>
  </defs>
</svg>
