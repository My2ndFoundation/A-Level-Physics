<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="320" height="280" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Free-Body Diagram: Block on a Slope</text>

  <!-- Slope surface -->
  <polygon points="40,220 280,220 280,240" fill="#d0d0d0" stroke="#888" stroke-width="1.5"/>

  <!-- Block (rectangle, rotated ~25 deg visually represented as parallelogram) -->
  <rect x="145" y="148" width="54" height="40" rx="3" fill="#4a90d9" stroke="#2060a0" stroke-width="1.5" transform="rotate(-25,172,168)"/>

  <!-- Weight arrow (straight down from centre) -->
  <line x1="172" y1="168" x2="172" y2="232" stroke="#e04040" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="178" y="215" fill="#e04040">W = mg</text>

  <!-- Normal force arrow (perpendicular to slope = tilted up-left) -->
  <line x1="172" y1="168" x2="132" y2="108" stroke="#2aa844" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="68" y="105" fill="#2aa844">N</text>

  <!-- Friction arrow (up the slope) -->
  <line x1="172" y1="168" x2="222" y2="148" stroke="#e08020" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="228" y="148" fill="#e08020">f</text>

  <!-- Angle label -->
  <path d="M 240,220 A 20,20 0 0 0 253,200" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="248" y="218" fill="#555" font-size="11">θ</text>

  <!-- Legend -->
  <line x1="30" y1="260" x2="50" y2="260" stroke="#e04040" stroke-width="2"/>
  <text x="54" y="264" fill="#555" font-size="11">Weight</text>
  <line x1="110" y1="260" x2="130" y2="260" stroke="#2aa844" stroke-width="2"/>
  <text x="134" y="264" fill="#555" font-size="11">Normal</text>
  <line x1="200" y1="260" x2="220" y2="260" stroke="#e08020" stroke-width="2"/>
  <text x="224" y="264" fill="#555" font-size="11">Friction</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e04040"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2aa844"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e08020"/>
    </marker>
  </defs>
</svg>
