<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="320" height="280" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="160" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Ray Model: Refraction at a Boundary</text>

  <!-- Boundary line -->
  <line x1="20" y1="140" x2="300" y2="140" stroke="#888" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Medium labels -->
  <text x="18" y="90" fill="#3366cc" font-size="12">Medium 1  n₁</text>
  <text x="18" y="200" fill="#2aa844" font-size="12">Medium 2  n₂ &gt; n₁</text>

  <!-- Normal (dashed vertical) -->
  <line x1="160" y1="50" x2="160" y2="240" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,4"/>
  <text x="168" y="58" fill="#aaa" font-size="11">normal</text>

  <!-- Incident ray (from upper-left to boundary) -->
  <line x1="70" y1="55" x2="160" y2="140" stroke="#3366cc" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Refracted ray (continues into medium 2, bends toward normal) -->
  <line x1="160" y1="140" x2="210" y2="240" stroke="#2aa844" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Reflected ray (for completeness, dashed) -->
  <line x1="160" y1="140" x2="250" y2="55" stroke="#3366cc" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlueDash)"/>
  <text x="252" y="52" fill="#3366cc" font-size="11">(reflected)</text>

  <!-- Angle of incidence arc -->
  <path d="M 160,115 A 25,25 0 0 0 143,122" fill="none" stroke="#3366cc" stroke-width="1.2"/>
  <text x="122" y="118" fill="#3366cc" font-size="12">θ₁</text>

  <!-- Angle of refraction arc -->
  <path d="M 160,165 A 25,25 0 0 1 172,176" fill="none" stroke="#2aa844" stroke-width="1.2"/>
  <text x="175" y="180" fill="#2aa844" font-size="12">θ₂</text>

  <!-- Snell's law annotation -->
  <rect x="10" y="250" width="300" height="22" fill="#f0f4ff" rx="4" stroke="#bbb" stroke-width="1"/>
  <text x="160" y="265" text-anchor="middle" fill="#333" font-size="12">n₁ sin θ₁ = n₂ sin θ₂   (θ₂ &lt; θ₁ when n₂ &gt; n₁)</text>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3366cc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2aa844"/>
    </marker>
    <marker id="arrowBlueDash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3366cc"/>
    </marker>
  </defs>
</svg>
