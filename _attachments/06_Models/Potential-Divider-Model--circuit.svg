<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="300" height="260" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="150" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Potential Divider Circuit</text>

  <!-- Supply battery on left side -->
  <line x1="50" y1="50" x2="50" y2="90" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="120" x2="50" y2="210" stroke="#333" stroke-width="2"/>
  <!-- Battery symbol -->
  <line x1="38" y1="90" x2="62" y2="90" stroke="#333" stroke-width="3"/>
  <line x1="42" y1="100" x2="58" y2="100" stroke="#333" stroke-width="1.5"/>
  <line x1="38" y1="110" x2="62" y2="110" stroke="#333" stroke-width="3"/>
  <line x1="42" y1="120" x2="58" y2="120" stroke="#333" stroke-width="1.5"/>
  <text x="24" y="108" text-anchor="end" fill="#333" font-size="12">V_in</text>

  <!-- Top wire -->
  <line x1="50" y1="50" x2="190" y2="50" stroke="#333" stroke-width="2"/>
  <!-- Bottom wire -->
  <line x1="50" y1="210" x2="190" y2="210" stroke="#333" stroke-width="2"/>

  <!-- R1 (top half, on right vertical) -->
  <line x1="190" y1="50" x2="190" y2="100" stroke="#333" stroke-width="2"/>
  <polyline points="190,100 178,108 202,116 178,124 202,132 178,140 202,148 190,156"
            fill="none" stroke="#c04000" stroke-width="2"/>
  <text x="210" y="132" fill="#c04000" font-size="12">R₁</text>
  <line x1="190" y1="156" x2="190" y2="130" stroke="none"/>

  <!-- Junction point at middle of right wire -->
  <circle cx="190" cy="155" r="4" fill="#333"/>

  <!-- R2 (bottom half, on right vertical) -->
  <line x1="190" y1="155" x2="190" y2="162" stroke="#333" stroke-width="2"/>
  <polyline points="190,162 178,170 202,178 178,186 202,194 178,202 190,210"
            fill="none" stroke="#2060a0" stroke-width="2"/>
  <text x="210" y="192" fill="#2060a0" font-size="12">R₂</text>

  <!-- Output wire from junction to output terminal -->
  <line x1="190" y1="155" x2="255" y2="155" stroke="#2aa844" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="260" cy="155" r="4" fill="#2aa844"/>
  <text x="268" y="158" fill="#2aa844" font-size="12">V_out</text>

  <!-- Output return wire (bottom) -->
  <line x1="190" y1="210" x2="255" y2="210" stroke="#2aa844" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="260" cy="210" r="4" fill="#2aa844"/>

  <!-- Current arrow on top wire -->
  <line x1="80" y1="45" x2="110" y2="45" stroke="#555" stroke-width="1.5" marker-end="url(#arrowI)"/>
  <text x="93" y="40" text-anchor="middle" fill="#555" font-size="11">I</text>

  <!-- Formula -->
  <text x="150" y="240" text-anchor="middle" fill="#444" font-size="12">V_out = V_in × R₂ / (R₁ + R₂)</text>

  <defs>
    <marker id="arrowI" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
