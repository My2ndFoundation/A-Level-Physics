<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 260" width="340" height="260" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="340" height="260" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="170" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Wavefront Model: Plane Waves Through a Slit</text>

  <!-- Barrier (left) -->
  <rect x="155" y="40" width="12" height="72" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Barrier (right) -->
  <rect x="155" y="148" width="12" height="72" fill="#555" stroke="#333" stroke-width="1"/>

  <!-- Slit gap label -->
  <text x="175" y="118" fill="#555" font-size="11">slit</text>
  <line x1="167" y1="112" x2="167" y2="148" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Incident plane wavefronts (left of barrier) -->
  <line x1="20" y1="60"  x2="155" y2="60"  stroke="#3366cc" stroke-width="1.5"/>
  <line x1="20" y1="90"  x2="155" y2="90"  stroke="#3366cc" stroke-width="1.5"/>
  <line x1="20" y1="120" x2="155" y2="120" stroke="#3366cc" stroke-width="1.5"/>
  <line x1="20" y1="150" x2="155" y2="150" stroke="#3366cc" stroke-width="1.5"/>
  <line x1="20" y1="180" x2="155" y2="180" stroke="#3366cc" stroke-width="1.5"/>

  <!-- Incident ray arrows -->
  <line x1="80" y1="60" x2="120" y2="60" stroke="#3366cc" stroke-width="1.2" marker-end="url(#arrowBlue2)"/>
  <line x1="80" y1="90" x2="120" y2="90" stroke="#3366cc" stroke-width="1.2" marker-end="url(#arrowBlue2)"/>
  <line x1="80" y1="120" x2="120" y2="120" stroke="#3366cc" stroke-width="1.2" marker-end="url(#arrowBlue2)"/>
  <line x1="80" y1="150" x2="120" y2="150" stroke="#3366cc" stroke-width="1.2" marker-end="url(#arrowBlue2)"/>
  <line x1="80" y1="180" x2="120" y2="180" stroke="#3366cc" stroke-width="1.2" marker-end="url(#arrowBlue2)"/>

  <!-- Diffracted circular wavefronts (right of slit, centred on slit centre ~130) -->
  <!-- Centre of slit at x=167, y=130 -->
  <circle cx="167" cy="130" r="30" fill="none" stroke="#e08020" stroke-width="1.5" stroke-dasharray="4,3" clip-path="url(#rightHalf)"/>
  <circle cx="167" cy="130" r="55" fill="none" stroke="#e08020" stroke-width="1.5" stroke-dasharray="4,3" clip-path="url(#rightHalf)"/>
  <circle cx="167" cy="130" r="80" fill="none" stroke="#e08020" stroke-width="1.5" stroke-dasharray="4,3" clip-path="url(#rightHalf)"/>
  <circle cx="167" cy="130" r="105" fill="none" stroke="#e08020" stroke-width="1.5" stroke-dasharray="4,3" clip-path="url(#rightHalf)"/>

  <!-- Labels -->
  <text x="30" y="38" fill="#3366cc" font-size="11">plane wavefronts</text>
  <text x="200" y="38" fill="#e08020" font-size="11">circular wavefronts</text>
  <text x="200" y="52" fill="#e08020" font-size="11">(diffracted)</text>

  <!-- Perpendicular ray labels after slit -->
  <text x="280" y="132" fill="#555" font-size="11">rays ⊥ fronts</text>

  <!-- Footnote -->
  <text x="170" y="248" text-anchor="middle" fill="#444" font-size="11">Huygens: each point on a wavefront acts as a new source</text>

  <defs>
    <marker id="arrowBlue2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3366cc"/>
    </marker>
    <clipPath id="rightHalf">
      <rect x="167" y="0" width="180" height="260"/>
    </clipPath>
  </defs>
</svg>
