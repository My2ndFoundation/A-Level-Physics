<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <rect width="320" height="260" fill="#ffffff"/>

  <!-- Axes -->
  <defs>
    <marker id="arrowGrey2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a73e8"/>
    </marker>
    <marker id="arrowRed2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e34a33"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ca02c"/>
    </marker>
  </defs>

  <line x1="60" y1="200" x2="280" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGrey2)"/>
  <line x1="60" y1="200" x2="60" y2="30" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGrey2)"/>
  <text x="285" y="204" fill="#555" font-size="12">x</text>
  <text x="52" y="25" fill="#555" font-size="12">y</text>
  <text x="44" y="215" fill="#555" font-size="11">O</text>

  <!-- Vector V at angle theta from x-axis -->
  <!-- Tip at (60+180, 200-130) = (240, 70) -->
  <line x1="60" y1="200" x2="240" y2="70" stroke="#1a73e8" stroke-width="2.5" marker-end="url(#arrowBlue2)"/>
  <text x="140" y="118" fill="#1a73e8" font-size="14" font-weight="bold">V</text>

  <!-- Vx -->
  <line x1="60" y1="200" x2="240" y2="200" stroke="#e34a33" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed2)"/>
  <text x="138" y="218" fill="#e34a33" font-size="13">Vx = V cosθ</text>

  <!-- Vy -->
  <line x1="240" y1="200" x2="240" y2="70" stroke="#2ca02c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen2)"/>
  <text x="245" y="138" fill="#2ca02c" font-size="13">Vy = V sinθ</text>

  <!-- Angle arc -->
  <path d="M 100,200 A 40,40 0 0,0 80,163" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="104" y="190" fill="#555" font-size="12">θ</text>

  <!-- Construction lines -->
  <line x1="60" y1="70" x2="240" y2="70" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="70" x2="60" y2="200" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
