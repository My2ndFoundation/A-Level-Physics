<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 230" width="300" height="230" font-family="sans-serif" font-size="13">
  <rect width="300" height="230" fill="#ffffff"/>

  <!-- Axes -->
  <defs>
    <marker id="arrA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="50" y1="190" x2="280" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrA)"/>
  <line x1="50" y1="190" x2="50" y2="20" stroke="#555" stroke-width="1.5" marker-end="url(#arrA)"/>

  <!-- Axis labels -->
  <text x="284" y="194" fill="#555" font-size="12">t / s</text>
  <text x="22" y="18" fill="#555" font-size="12">v / m s⁻¹</text>

  <!-- Tick marks -->
  <line x1="170" y1="186" x2="170" y2="194" stroke="#555" stroke-width="1"/>
  <text x="164" y="207" fill="#555" font-size="11">4</text>
  <line x1="46" y1="70" x2="54" y2="70" stroke="#555" stroke-width="1"/>
  <text x="28" y="74" fill="#555" font-size="11">8</text>

  <!-- v-t line: uniform increase from (0,0) at origin (50,190) to (4s, 8ms⁻¹) at (170, 70) -->
  <line x1="50" y1="190" x2="170" y2="70" stroke="#1a73e8" stroke-width="2.5"/>

  <!-- Shaded triangle area -->
  <polygon points="50,190 170,190 170,70" fill="#1a73e8" fill-opacity="0.15" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Area label inside triangle -->
  <text x="85" y="160" fill="#1a73e8" font-size="12">Area = ½ × 4 × 8</text>
  <text x="90" y="178" fill="#1a73e8" font-size="12">= 16 m</text>

  <!-- Dimension arrows -->
  <text x="155" y="140" fill="#555" font-size="11">8 m s⁻¹</text>
  <text x="95" y="205" fill="#555" font-size="11">4 s</text>

  <!-- Title -->
  <text x="55" y="45" fill="#555" font-size="11">Velocity–time graph: area = displacement</text>
</svg>
