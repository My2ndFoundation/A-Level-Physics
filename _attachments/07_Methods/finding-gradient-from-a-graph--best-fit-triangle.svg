<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240" font-family="sans-serif" font-size="13">
  <rect width="300" height="240" fill="#ffffff"/>

  <!-- Axes -->
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
  <line x1="50" y1="210" x2="280" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrG)"/>
  <line x1="50" y1="210" x2="50" y2="20" stroke="#555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Axis labels -->
  <text x="284" y="214" fill="#555" font-size="12">t / s</text>
  <text x="28" y="18" fill="#555" font-size="12">v / m s⁻¹</text>

  <!-- Tick marks and values on x axis -->
  <line x1="90" y1="206" x2="90" y2="214" stroke="#555" stroke-width="1"/>
  <text x="85" y="226" fill="#555" font-size="11">1</text>
  <line x1="170" y1="206" x2="170" y2="214" stroke="#555" stroke-width="1"/>
  <text x="165" y="226" fill="#555" font-size="11">3</text>
  <line x1="250" y1="206" x2="250" y2="214" stroke="#555" stroke-width="1"/>
  <text x="245" y="226" fill="#555" font-size="11">5</text>

  <!-- Tick marks and values on y axis -->
  <line x1="46" y1="170" x2="54" y2="170" stroke="#555" stroke-width="1"/>
  <text x="28" y="174" fill="#555" font-size="11">2</text>
  <line x1="46" y1="90" x2="54" y2="90" stroke="#555" stroke-width="1"/>
  <text x="28" y="94" fill="#555" font-size="11">8</text>

  <!-- Best-fit line: passes through (1s,2ms⁻¹) and (5s,14ms⁻¹) -->
  <!-- (1,2) maps to x=90, y=170 -->
  <!-- (5,14) maps to x=250, y=90 -->
  <!-- Line extended a bit either side -->
  <line x1="70" y1="180" x2="260" y2="82" stroke="#1a73e8" stroke-width="2"/>

  <!-- Data scatter points (3 points that roughly align) -->
  <circle cx="90" cy="170" r="4" fill="#1a73e8"/>
  <circle cx="130" cy="150" r="4" fill="#1a73e8"/>
  <circle cx="170" cy="128" r="4" fill="#1a73e8"/>
  <circle cx="210" cy="108" r="4" fill="#1a73e8"/>
  <circle cx="250" cy="90" r="4" fill="#1a73e8"/>

  <!-- Triangle for gradient Δy/Δx -->
  <!-- Point 1: (90, 170), Point 2: (250, 170), Point 3: (250, 90) -->
  <line x1="90" y1="170" x2="250" y2="170" stroke="#e34a33" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="250" y1="170" x2="250" y2="90" stroke="#2ca02c" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Labels for triangle sides -->
  <text x="150" y="185" fill="#e34a33" font-size="12">Δx = 4 s</text>
  <text x="254" y="135" fill="#2ca02c" font-size="12">Δy = 12 m s⁻¹</text>

  <!-- Gradient label -->
  <text x="55" y="55" fill="#555" font-size="12">gradient = Δy/Δx = 3.0 m s⁻²</text>
</svg>
