<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="320" height="260" fill="#ffffff"/>

  <!-- Axes -->
  <line x1="60" y1="200" x2="280" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  <line x1="60" y1="200" x2="60" y2="30" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGrey)"/>
  <text x="285" y="204" fill="#555" font-size="12">x</text>
  <text x="52" y="25" fill="#555" font-size="12">y</text>

  <!-- Origin label -->
  <text x="44" y="215" fill="#555" font-size="11">O</text>

  <!-- Force vector F at angle theta -->
  <!-- From (60,200) to (60+180, 200-120) = (240, 80) -->
  <line x1="60" y1="200" x2="240" y2="80" stroke="#1a73e8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="145" y="125" fill="#1a73e8" font-size="14" font-weight="bold">F</text>

  <!-- Horizontal component Fx -->
  <line x1="60" y1="200" x2="240" y2="200" stroke="#e34a33" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="140" y="218" fill="#e34a33" font-size="13">F cosθ</text>

  <!-- Vertical component Fy -->
  <line x1="240" y1="200" x2="240" y2="80" stroke="#2ca02c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="245" y="145" fill="#2ca02c" font-size="13">F sinθ</text>

  <!-- Angle arc -->
  <path d="M 100,200 A 40,40 0 0,0 82,168" fill="none" stroke="#555" stroke-width="1.2"/>
  <text x="103" y="190" fill="#555" font-size="12">θ</text>

  <!-- Dashed construction lines completing parallelogram -->
  <line x1="60" y1="80" x2="240" y2="80" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="60" y1="80" x2="60" y2="200" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a73e8"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e34a33"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ca02c"/>
    </marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
