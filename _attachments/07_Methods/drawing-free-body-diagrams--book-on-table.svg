<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" width="240" height="220" font-family="sans-serif" font-size="13">
  <rect width="240" height="220" fill="#ffffff"/>

  <!-- Book represented as a box -->
  <rect x="80" y="90" width="80" height="40" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" fill="#1a73e8" font-size="12">book</text>

  <!-- Weight arrow downward -->
  <line x1="120" y1="130" x2="120" y2="185" stroke="#e34a33" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="130" y="165" fill="#e34a33" font-size="13" font-style="italic">W</text>

  <!-- Normal force arrow upward -->
  <line x1="120" y1="90" x2="120" y2="35" stroke="#2ca02c" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  <text x="128" y="65" fill="#2ca02c" font-size="13" font-style="italic">N</text>

  <!-- Table surface line -->
  <line x1="40" y1="130" x2="200" y2="130" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="42" y="148" fill="#888" font-size="11">table surface</text>

  <!-- Labels -->
  <text x="120" y="210" text-anchor="middle" fill="#555" font-size="11">N = W (equilibrium)</text>

  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#e34a33"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="3" refY="2" orient="auto-start-reverse">
      <path d="M0,8 L6,8 L3,0 z" fill="#2ca02c"/>
    </marker>
  </defs>
</svg>
