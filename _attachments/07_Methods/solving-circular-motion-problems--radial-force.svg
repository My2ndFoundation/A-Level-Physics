<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240" font-family="sans-serif" font-size="13">
  <rect width="280" height="240" fill="#ffffff"/>

  <!-- Circle path (dashed orbit) -->
  <circle cx="140" cy="120" r="80" fill="none" stroke="#bbb" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Centre dot -->
  <circle cx="140" cy="120" r="4" fill="#555"/>
  <text x="143" y="134" fill="#555" font-size="11">centre</text>

  <!-- Object at top of circle -->
  <circle cx="140" cy="40" r="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="153" y="44" fill="#1a73e8" font-size="12">m</text>

  <!-- Velocity arrow (tangential, pointing right) -->
  <line x1="150" y1="40" x2="220" y2="40" stroke="#2ca02c" stroke-width="2" marker-end="url(#arrVc)"/>
  <text x="222" y="44" fill="#2ca02c" font-size="12">v</text>

  <!-- Centripetal force arrow (radially inward, downward from top) -->
  <line x1="140" y1="50" x2="140" y2="100" stroke="#e34a33" stroke-width="2.5" marker-end="url(#arrFc)"/>
  <text x="144" y="82" fill="#e34a33" font-size="12">F = mv²/r</text>

  <!-- Radius line (dashed) -->
  <line x1="140" y1="120" x2="140" y2="50" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="145" y="93" fill="#aaa" font-size="11">r</text>

  <!-- Label -->
  <text x="20" y="220" fill="#555" font-size="11">Net inward force = centripetal requirement</text>

  <defs>
    <marker id="arrVc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ca02c"/>
    </marker>
    <marker id="arrFc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e34a33"/>
    </marker>
  </defs>
</svg>
