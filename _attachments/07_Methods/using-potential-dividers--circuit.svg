<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280" font-family="sans-serif" font-size="13">
  <rect width="220" height="280" fill="#ffffff"/>

  <!-- Supply voltage label at top -->
  <text x="85" y="20" fill="#555" font-size="12" text-anchor="middle">V_in</text>

  <!-- Left wire: top rail -->
  <line x1="50" y1="25" x2="170" y2="25" stroke="#333" stroke-width="2"/>

  <!-- Left wire going down to R1 -->
  <line x1="50" y1="25" x2="50" y2="60" stroke="#333" stroke-width="2"/>

  <!-- R1 component box -->
  <rect x="35" y="60" width="30" height="50" fill="#fff9e6" stroke="#e34a33" stroke-width="2"/>
  <text x="50" y="90" text-anchor="middle" fill="#e34a33" font-size="12">R₁</text>

  <!-- Wire from R1 down to junction -->
  <line x1="50" y1="110" x2="50" y2="155" stroke="#333" stroke-width="2"/>

  <!-- Junction dot -->
  <circle cx="50" cy="155" r="4" fill="#333"/>

  <!-- R2 component box -->
  <rect x="35" y="155" width="30" height="50" fill="#fff9e6" stroke="#2ca02c" stroke-width="2"/>
  <text x="50" y="185" text-anchor="middle" fill="#2ca02c" font-size="12">R₂</text>

  <!-- Wire from R2 down to bottom rail -->
  <line x1="50" y1="205" x2="50" y2="250" stroke="#333" stroke-width="2"/>

  <!-- Bottom rail -->
  <line x1="50" y1="250" x2="170" y2="250" stroke="#333" stroke-width="2"/>

  <!-- Right wire from top to bottom (no current; output tap) -->
  <line x1="170" y1="25" x2="170" y2="250" stroke="#333" stroke-width="2"/>

  <!-- Output tap at junction level -->
  <line x1="50" y1="155" x2="130" y2="155" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="130" y1="155" x2="130" y2="220" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="50" y1="250" x2="130" y2="250" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="136" y="198" fill="#1a73e8" font-size="12">V_out</text>

  <!-- Arrow indicating V_out -->
  <line x1="128" y1="155" x2="128" y2="248" stroke="#1a73e8" stroke-width="1" marker-end="url(#arrVout)" marker-start="url(#arrVout2)"/>

  <!-- Formula -->
  <text x="110" y="268" fill="#555" font-size="11" text-anchor="middle">V_out = V_in × R₂/(R₁+R₂)</text>

  <defs>
    <marker id="arrVout" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#1a73e8"/>
    </marker>
    <marker id="arrVout2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L6,3 z" fill="#1a73e8"/>
    </marker>
  </defs>
</svg>
