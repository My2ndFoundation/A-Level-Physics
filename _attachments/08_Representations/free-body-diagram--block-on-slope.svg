<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <!-- Title -->
  <text x="160" y="18" text-anchor="middle" font-size="14" font-weight="bold">Free-Body Diagram: block on a surface</text>

  <!-- Block (the free body) -->
  <rect x="130" y="100" width="60" height="50" fill="#d0e8ff" stroke="#333" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" font-size="12">block</text>

  <!-- Weight arrow (downward) -->
  <line x1="160" y1="150" x2="160" y2="210" stroke="#c00" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="172" y="200" fill="#c00">W = mg</text>

  <!-- Normal force arrow (upward) -->
  <line x1="160" y1="100" x2="160" y2="40" stroke="#006" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="168" y="60" fill="#006">N</text>

  <!-- Friction arrow (leftward) -->
  <line x1="130" y1="125" x2="60" y2="125" stroke="#090" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="65" y="118" fill="#090">f (friction)</text>

  <!-- Applied force arrow (rightward) -->
  <line x1="190" y1="125" x2="260" y2="125" stroke="#a60" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="200" y="118" fill="#a60">F (applied)</text>

  <!-- Surface line -->
  <line x1="50" y1="150" x2="270" y2="150" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="245" text-anchor="middle" font-size="11" fill="#555">All arrows show forces ON the block only.</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c00"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#006"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#090"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a60"/>
    </marker>
  </defs>
</svg>
