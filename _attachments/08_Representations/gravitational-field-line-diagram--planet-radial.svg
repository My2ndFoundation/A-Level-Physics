<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="160" y="18" text-anchor="middle" font-size="14" font-weight="bold">Gravitational Field Lines (Planet)</text>

  <!-- Planet -->
  <circle cx="160" cy="165" r="40" fill="#8cb8e8" stroke="#357" stroke-width="2"/>
  <text x="160" y="170" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">M</text>

  <!-- Arrowheads pointing inward (toward the planet) -->
  <defs>
    <marker id="arrIn" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#357"/>
    </marker>
  </defs>

  <!-- 8 radial lines inward, arrows point toward centre -->
  <!-- Right -->
  <line x1="272" y1="165" x2="202" y2="165" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Left -->
  <line x1="48" y1="165" x2="118" y2="165" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Up -->
  <line x1="160" y1="55" x2="160" y2="125" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Down -->
  <line x1="160" y1="275" x2="160" y2="205" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Upper-right -->
  <line x1="248" y1="77" x2="203" y2="122" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Lower-right -->
  <line x1="248" y1="253" x2="203" y2="208" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Upper-left -->
  <line x1="72" y1="77" x2="117" y2="122" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>
  <!-- Lower-left -->
  <line x1="72" y1="253" x2="117" y2="208" stroke="#357" stroke-width="1.8" marker-end="url(#arrIn)"/>

  <!-- Note: lines are more densely packed closer in (inverse-square) -->
  <!-- Additional shorter lines near surface to indicate denser field -->
  <line x1="220" y1="130" x2="200" y2="143" stroke="#357" stroke-width="1.4" marker-end="url(#arrIn)"/>
  <line x1="220" y1="200" x2="200" y2="187" stroke="#357" stroke-width="1.4" marker-end="url(#arrIn)"/>
  <line x1="100" y1="130" x2="120" y2="143" stroke="#357" stroke-width="1.4" marker-end="url(#arrIn)"/>
  <line x1="100" y1="200" x2="120" y2="187" stroke="#357" stroke-width="1.4" marker-end="url(#arrIn)"/>

  <text x="160" y="308" text-anchor="middle" font-size="11" fill="#555">All lines point toward M (gravity is always attractive). Closer spacing = stronger g.</text>
</svg>
