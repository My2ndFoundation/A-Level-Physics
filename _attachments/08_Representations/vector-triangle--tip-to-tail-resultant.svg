<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 260" width="340" height="260" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="170" y="18" text-anchor="middle" font-size="14" font-weight="bold">Vector Triangle: Tip-to-Tail Addition</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="vtA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c00"/>
    </marker>
    <marker id="vtB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#060"/>
    </marker>
    <marker id="vtR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#006"/>
    </marker>
  </defs>

  <!-- Vector A: from origin (60,180) to (200,180) — horizontal -->
  <line x1="60" y1="180" x2="198" y2="180" stroke="#c00" stroke-width="2.5" marker-end="url(#vtA)"/>
  <text x="125" y="198" text-anchor="middle" fill="#c00" font-size="13" font-weight="bold">A</text>

  <!-- Vector B: from tip of A (200,180) to (270,90) — upper-right -->
  <line x1="200" y1="180" x2="268" y2="92" stroke="#060" stroke-width="2.5" marker-end="url(#vtB)"/>
  <text x="248" y="148" fill="#060" font-size="13" font-weight="bold">B</text>

  <!-- Resultant R: from start of A (60,180) to tip of B (270,90) — closing side -->
  <line x1="60" y1="180" x2="268" y2="92" stroke="#006" stroke-width="2.5" stroke-dasharray="7,3" marker-end="url(#vtR)"/>
  <text x="148" y="118" fill="#006" font-size="13" font-weight="bold">R = A + B</text>

  <!-- Origin dot -->
  <circle cx="60" cy="180" r="4" fill="#333"/>
  <text x="55" y="200" fill="#333" font-size="11">start</text>

  <!-- Tip of B dot -->
  <circle cx="270" cy="90" r="4" fill="#333"/>
  <text x="273" y="90" fill="#333" font-size="11">end</text>

  <!-- Tip of A / start of B dot -->
  <circle cx="200" cy="180" r="4" fill="#333"/>
  <text x="196" y="198" text-anchor="middle" fill="#333" font-size="11">tip A / start B</text>

  <!-- Angle arc at origin (angle of R) -->
  <path d="M 100 180 A 40 40 0 0 1 87 154" fill="none" stroke="#006" stroke-width="1.2"/>
  <text x="110" y="162" fill="#006" font-size="11">θ</text>

  <!-- Scale note -->
  <text x="170" y="240" text-anchor="middle" font-size="11" fill="#555">Each arrow length ∝ vector magnitude. R measured by scale rule; θ by protractor.</text>
</svg>
