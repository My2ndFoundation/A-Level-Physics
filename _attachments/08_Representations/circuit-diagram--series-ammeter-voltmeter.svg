<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" width="380" height="240" font-family="sans-serif" font-size="13">
  <!-- Title -->
  <text x="190" y="18" text-anchor="middle" font-size="14" font-weight="bold">Circuit Diagram: cell, resistor, ammeter, voltmeter</text>

  <!-- Circuit wires (rectangle loop) -->
  <!-- Top wire: left to right -->
  <line x1="50" y1="60" x2="330" y2="60" stroke="#222" stroke-width="2"/>
  <!-- Right wire: top to bottom -->
  <line x1="330" y1="60" x2="330" y2="180" stroke="#222" stroke-width="2"/>
  <!-- Bottom wire: right to left -->
  <line x1="330" y1="180" x2="50" y2="180" stroke="#222" stroke-width="2"/>
  <!-- Left wire: bottom to top -->
  <line x1="50" y1="180" x2="50" y2="60" stroke="#222" stroke-width="2"/>

  <!-- Cell (left wire, centred at y=120) -->
  <!-- long line = positive, short = negative -->
  <line x1="50" y1="100" x2="50" y2="140" stroke="#222" stroke-width="2"/>
  <line x1="40" y1="108" x2="60" y2="108" stroke="#222" stroke-width="3"/>
  <line x1="44" y1="120" x2="56" y2="120" stroke="#222" stroke-width="1.5"/>
  <text x="18" y="115" fill="#333" font-size="11">+ </text>
  <text x="18" y="127" fill="#333" font-size="11">−</text>
  <text x="62" y="122" fill="#333" font-size="11">EMF</text>

  <!-- Resistor (top wire, centred at x=190) -->
  <rect x="150" y="48" width="80" height="24" fill="none" stroke="#222" stroke-width="2"/>
  <text x="190" y="64" text-anchor="middle" font-size="11">R</text>

  <!-- Ammeter (top wire, right side, centred at x=280) -->
  <circle cx="280" cy="60" r="14" fill="white" stroke="#222" stroke-width="2"/>
  <text x="280" y="65" text-anchor="middle" font-size="12" font-weight="bold">A</text>

  <!-- Voltmeter (parallel branch, right side) -->
  <!-- Voltmeter connects across the resistor: from x=150,y=60 to x=230,y=60 via a lower loop -->
  <line x1="150" y1="60" x2="150" y2="90" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="150" y1="90" x2="230" y2="90" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="230" y1="60" x2="230" y2="90" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="190" cy="90" r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <text x="190" y="94" text-anchor="middle" font-size="11" fill="#555">V</text>
  <text x="190" y="115" text-anchor="middle" font-size="10" fill="#555">(voltmeter in parallel)</text>

  <!-- Junction dots -->
  <circle cx="150" cy="60" r="3" fill="#222"/>
  <circle cx="230" cy="60" r="3" fill="#222"/>

  <!-- Labels bottom -->
  <text x="190" y="215" text-anchor="middle" font-size="11" fill="#555">Ammeter (A) in series; voltmeter (V) in parallel across R.</text>
</svg>
