<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="400" height="360" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="bold">Hertzsprung–Russell Diagram (schematic)</text>

  <!-- Axes -->
  <!-- y-axis (Luminosity) -->
  <line x1="60" y1="30" x2="60" y2="310" stroke="#333" stroke-width="2"/>
  <!-- x-axis (Temperature, decreasing left to right) -->
  <line x1="60" y1="310" x2="370" y2="310" stroke="#333" stroke-width="2"/>

  <!-- Axis labels -->
  <!-- y-axis label (rotated) -->
  <text transform="rotate(-90 18 170)" x="18" y="170" text-anchor="middle" font-size="12">Luminosity (L/L☉, log scale)</text>
  <!-- x-axis label -->
  <text x="215" y="340" text-anchor="middle" font-size="12">Surface temperature (K) — decreasing →</text>

  <!-- Tick labels on x-axis (temperature decreasing) -->
  <text x="80" y="326" text-anchor="middle" font-size="10">40 000</text>
  <text x="150" y="326" text-anchor="middle" font-size="10">20 000</text>
  <text x="220" y="326" text-anchor="middle" font-size="10">10 000</text>
  <text x="290" y="326" text-anchor="middle" font-size="10">5 000</text>
  <text x="355" y="326" text-anchor="middle" font-size="10">3 000</text>

  <!-- Tick labels on y-axis (luminosity) -->
  <text x="55" y="314" text-anchor="end" font-size="10">10⁻⁴</text>
  <text x="55" y="260" text-anchor="end" font-size="10">10⁻²</text>
  <text x="55" y="205" text-anchor="end" font-size="10">1</text>
  <text x="55" y="150" text-anchor="end" font-size="10">10²</text>
  <text x="55" y="95" text-anchor="end" font-size="10">10⁴</text>
  <text x="55" y="40" text-anchor="end" font-size="10">10⁶</text>

  <!-- === Main Sequence (diagonal band, hot-bright top-left to cool-faint bottom-right) === -->
  <path d="M 80 45 Q 150 110 220 190 Q 280 255 350 300" fill="none" stroke="#3399ff" stroke-width="14" stroke-opacity="0.35"/>
  <text x="130" y="130" fill="#3399ff" font-size="11" font-weight="bold" transform="rotate(-42 130 130)">Main Sequence</text>

  <!-- === Giants / Supergiants region (upper right) === -->
  <ellipse cx="300" cy="100" rx="55" ry="35" fill="#ff9933" fill-opacity="0.35" stroke="#ff9933" stroke-width="1.5"/>
  <text x="300" y="96" text-anchor="middle" font-size="11" fill="#cc6600" font-weight="bold">Supergiants</text>
  <ellipse cx="290" cy="155" rx="45" ry="22" fill="#ffcc66" fill-opacity="0.35" stroke="#cc9900" stroke-width="1.5"/>
  <text x="290" y="160" text-anchor="middle" font-size="11" fill="#cc9900" font-weight="bold">Giants</text>

  <!-- === White Dwarfs region (lower left) === -->
  <ellipse cx="120" cy="278" rx="40" ry="18" fill="#aaddff" fill-opacity="0.45" stroke="#6699bb" stroke-width="1.5"/>
  <text x="120" y="283" text-anchor="middle" font-size="11" fill="#3366aa" font-weight="bold">White Dwarfs</text>

  <!-- Spectral class labels (O B A F G K M along x-axis top) -->
  <text x="80" y="46" text-anchor="middle" font-size="10" fill="#555">O</text>
  <text x="120" y="46" text-anchor="middle" font-size="10" fill="#555">B</text>
  <text x="165" y="46" text-anchor="middle" font-size="10" fill="#555">A</text>
  <text x="205" y="46" text-anchor="middle" font-size="10" fill="#555">F</text>
  <text x="240" y="46" text-anchor="middle" font-size="10" fill="#555">G</text>
  <text x="285" y="46" text-anchor="middle" font-size="10" fill="#555">K</text>
  <text x="345" y="46" text-anchor="middle" font-size="10" fill="#555">M</text>
  <text x="215" y="58" text-anchor="middle" font-size="10" fill="#888">← spectral class (O B A F G K M)</text>

  <!-- Sun position marker -->
  <circle cx="228" cy="200" r="6" fill="#ffdd00" stroke="#cc8800" stroke-width="1.5"/>
  <text x="238" y="198" font-size="10" fill="#cc8800">☉ Sun</text>
</svg>
