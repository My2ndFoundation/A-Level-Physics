<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="210" y="18" text-anchor="middle" font-size="14" font-weight="bold">Wavefront Diagrams</text>

  <!-- === LEFT: Plane wavefronts === -->
  <text x="95" y="38" text-anchor="middle" font-size="12" font-weight="bold">Plane wave</text>

  <!-- Parallel vertical wavefronts (lines of constant phase) -->
  <line x1="40" y1="50" x2="40" y2="200" stroke="#357" stroke-width="2"/>
  <line x1="70" y1="50" x2="70" y2="200" stroke="#357" stroke-width="2"/>
  <line x1="100" y1="50" x2="100" y2="200" stroke="#357" stroke-width="2"/>
  <line x1="130" y1="50" x2="130" y2="200" stroke="#357" stroke-width="2"/>
  <line x1="160" y1="50" x2="160" y2="200" stroke="#357" stroke-width="2"/>

  <!-- Direction of propagation arrows (perpendicular = horizontal rightward) -->
  <defs>
    <marker id="wArr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#357"/>
    </marker>
  </defs>
  <line x1="40" y1="100" x2="165" y2="100" stroke="#357" stroke-width="1.5" marker-end="url(#wArr)"/>
  <line x1="40" y1="150" x2="165" y2="150" stroke="#357" stroke-width="1.5" marker-end="url(#wArr)"/>

  <!-- Spacing label -->
  <line x1="40" y1="215" x2="70" y2="215" stroke="#555" stroke-width="1"/>
  <text x="55" y="230" text-anchor="middle" font-size="11" fill="#555">λ</text>

  <text x="95" y="248" text-anchor="middle" font-size="11" fill="#555">Fronts equally spaced (λ).</text>

  <!-- Divider -->
  <line x1="205" y1="30" x2="205" y2="240" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === RIGHT: Circular wavefronts from a point source === -->
  <text x="315" y="38" text-anchor="middle" font-size="12" font-weight="bold">Point source (circular)</text>

  <!-- Point source -->
  <circle cx="315" cy="130" r="4" fill="#c50"/>
  <text x="315" y="150" text-anchor="middle" font-size="11" fill="#c50">source</text>

  <!-- Concentric circles (each one wavelength apart) -->
  <circle cx="315" cy="130" r="25" fill="none" stroke="#357" stroke-width="2"/>
  <circle cx="315" cy="130" r="50" fill="none" stroke="#357" stroke-width="2"/>
  <circle cx="315" cy="130" r="75" fill="none" stroke="#357" stroke-width="2"/>
  <circle cx="315" cy="130" r="100" fill="none" stroke="#357" stroke-width="1.5"/>

  <!-- Direction ray (rightward) -->
  <line x1="315" y1="130" x2="415" y2="130" stroke="#357" stroke-width="1.5" marker-end="url(#wArr)"/>
  <text x="395" y="124" fill="#357" font-size="11">ray</text>

  <!-- Spacing label -->
  <line x1="315" y1="215" x2="340" y2="215" stroke="#555" stroke-width="1"/>
  <text x="327" y="230" text-anchor="middle" font-size="11" fill="#555">λ</text>

  <text x="315" y="248" text-anchor="middle" font-size="11" fill="#555">Rays ⊥ wavefronts; spacing = λ.</text>
</svg>
