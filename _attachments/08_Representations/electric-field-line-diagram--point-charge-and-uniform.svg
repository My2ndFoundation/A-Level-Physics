<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="210" y="16" text-anchor="middle" font-size="14" font-weight="bold">Electric Field Lines</text>

  <!-- LEFT: Positive point charge radial field -->
  <text x="100" y="36" text-anchor="middle" font-size="12" font-weight="bold">Point charge (+)</text>
  <!-- Central charge -->
  <circle cx="100" cy="140" r="12" fill="#ffd0d0" stroke="#c00" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" font-size="13" fill="#c00" font-weight="bold">+</text>

  <!-- Radial arrows outward (8 directions) -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c00"/>
    </marker>
  </defs>
  <!-- Right -->
  <line x1="112" y1="140" x2="155" y2="140" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Left -->
  <line x1="88" y1="140" x2="45" y2="140" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Up -->
  <line x1="100" y1="128" x2="100" y2="85" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Down -->
  <line x1="100" y1="152" x2="100" y2="195" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Upper-right -->
  <line x1="109" y1="131" x2="140" y2="100" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Lower-right -->
  <line x1="109" y1="149" x2="140" y2="180" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Upper-left -->
  <line x1="91" y1="131" x2="60" y2="100" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- Lower-left -->
  <line x1="91" y1="149" x2="60" y2="180" stroke="#c00" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Divider -->
  <line x1="210" y1="30" x2="210" y2="230" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- RIGHT: Uniform field (parallel plates) -->
  <text x="315" y="36" text-anchor="middle" font-size="12" font-weight="bold">Uniform field (plates)</text>
  <!-- Plates -->
  <rect x="240" y="55" width="150" height="12" fill="#aac" stroke="#446" stroke-width="1.5"/>
  <text x="250" y="66" font-size="11" fill="#446">+ + + + + + +</text>
  <rect x="240" y="193" width="150" height="12" fill="#aac" stroke="#446" stroke-width="1.5"/>
  <text x="250" y="203" font-size="11" fill="#446">− − − − − − −</text>

  <!-- Uniform vertical field lines (equally spaced, downward) -->
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#446"/>
    </marker>
  </defs>
  <line x1="262" y1="67" x2="262" y2="190" stroke="#446" stroke-width="1.8" marker-end="url(#arr2)"/>
  <line x1="285" y1="67" x2="285" y2="190" stroke="#446" stroke-width="1.8" marker-end="url(#arr2)"/>
  <line x1="308" y1="67" x2="308" y2="190" stroke="#446" stroke-width="1.8" marker-end="url(#arr2)"/>
  <line x1="331" y1="67" x2="331" y2="190" stroke="#446" stroke-width="1.8" marker-end="url(#arr2)"/>
  <line x1="354" y1="67" x2="354" y2="190" stroke="#446" stroke-width="1.8" marker-end="url(#arr2)"/>

  <!-- Caption -->
  <text x="210" y="248" text-anchor="middle" font-size="11" fill="#555">Lines point away from + charge; uniform between plates (E = V/d).</text>
</svg>
