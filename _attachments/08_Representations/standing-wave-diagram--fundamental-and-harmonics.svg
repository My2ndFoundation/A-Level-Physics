<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" font-family="sans-serif" font-size="12">
  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="14" font-weight="bold">Standing-Wave Diagrams: String (fixed both ends)</text>

  <!-- === Fundamental (1st harmonic): 1 loop === -->
  <text x="12" y="55" font-size="12" font-weight="bold">n=1 (fundamental)</text>
  <!-- String supports -->
  <circle cx="40" cy="70" r="4" fill="#555"/>
  <circle cx="360" cy="70" r="4" fill="#555"/>
  <!-- Two extreme envelope curves -->
  <path d="M 40 70 Q 200 30 360 70" fill="none" stroke="#c55" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 40 70 Q 200 110 360 70" fill="none" stroke="#c55" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Node labels -->
  <text x="40" y="88" text-anchor="middle" font-size="10" fill="#555">N</text>
  <text x="360" y="88" text-anchor="middle" font-size="10" fill="#555">N</text>
  <!-- Antinode label -->
  <text x="200" y="24" text-anchor="middle" font-size="10" fill="#c55">A</text>
  <!-- Lambda annotation -->
  <text x="200" y="90" text-anchor="middle" font-size="11" fill="#333">L = λ/2   (one loop)</text>

  <!-- === 2nd harmonic: 2 loops === -->
  <text x="12" y="135" font-size="12" font-weight="bold">n=2 (2nd harmonic)</text>
  <circle cx="40" cy="155" r="4" fill="#555"/>
  <circle cx="200" cy="155" r="4" fill="#555"/>
  <circle cx="360" cy="155" r="4" fill="#555"/>
  <!-- Loop 1 -->
  <path d="M 40 155 Q 120 120 200 155" fill="none" stroke="#55c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 40 155 Q 120 190 200 155" fill="none" stroke="#55c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Loop 2 -->
  <path d="M 200 155 Q 280 120 360 155" fill="none" stroke="#55c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 200 155 Q 280 190 360 155" fill="none" stroke="#55c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Node labels -->
  <text x="40" y="173" text-anchor="middle" font-size="10" fill="#555">N</text>
  <text x="200" y="173" text-anchor="middle" font-size="10" fill="#555">N</text>
  <text x="360" y="173" text-anchor="middle" font-size="10" fill="#555">N</text>
  <!-- Lambda annotation -->
  <text x="200" y="175" text-anchor="middle" font-size="11" fill="#333">L = λ   (two loops)</text>

  <!-- === 3rd harmonic: 3 loops === -->
  <text x="12" y="220" font-size="12" font-weight="bold">n=3 (3rd harmonic)</text>
  <circle cx="40" cy="240" r="4" fill="#555"/>
  <circle cx="147" cy="240" r="4" fill="#555"/>
  <circle cx="253" cy="240" r="4" fill="#555"/>
  <circle cx="360" cy="240" r="4" fill="#555"/>
  <!-- Loop 1 -->
  <path d="M 40 240 Q 93 215 147 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 40 240 Q 93 265 147 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Loop 2 -->
  <path d="M 147 240 Q 200 215 253 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 147 240 Q 200 265 253 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Loop 3 -->
  <path d="M 253 240 Q 307 215 360 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M 253 240 Q 307 265 360 240" fill="none" stroke="#585" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Lambda annotation -->
  <text x="200" y="285" text-anchor="middle" font-size="11" fill="#333">L = 3λ/2 (three loops); node spacing = λ/2</text>
</svg>
