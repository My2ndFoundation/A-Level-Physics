<svg xmlns="http://www.w3.org/2000/svg" width="460" height="240" viewBox="0 0 460 240">
  <rect width="460" height="240" fill="#ffffff"/>
  <!-- Left: point positive charge radial field -->
  <text x="50" y="18" font-family="sans-serif" font-size="12" fill="#333">Radial field (+Q)</text>
  <!-- Central positive charge -->
  <circle cx="115" cy="120" r="14" fill="#e53935" opacity="0.9"/>
  <text x="109" y="125" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">+</text>
  <!-- 8 field lines outward -->
  <line x1="115" y1="106" x2="115" y2="30" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="115,30 111,42 119,42" fill="#e53935"/>
  <line x1="127" y1="109" x2="180" y2="55" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="180,55 172,64 179,66" fill="#e53935"/>
  <line x1="129" y1="120" x2="205" y2="120" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="205,120 193,116 193,124" fill="#e53935"/>
  <line x1="127" y1="131" x2="180" y2="185" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="180,185 172,174 179,176" fill="#e53935"/>
  <line x1="115" y1="134" x2="115" y2="210" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="115,210 111,198 119,198" fill="#e53935"/>
  <line x1="103" y1="131" x2="50" y2="185" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="50,185 58,176 51,174" fill="#e53935"/>
  <line x1="101" y1="120" x2="25" y2="120" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="25,120 37,116 37,124" fill="#e53935"/>
  <line x1="103" y1="109" x2="50" y2="55" stroke="#e53935" stroke-width="1.5"/>
  <polygon points="50,55 51,66 58,64" fill="#e53935"/>

  <!-- Right: uniform field between parallel plates -->
  <text x="275" y="18" font-family="sans-serif" font-size="12" fill="#333">Uniform field (parallel plates)</text>
  <!-- Top plate + -->
  <rect x="265" y="35" width="160" height="12" fill="#e53935" rx="2"/>
  <text x="435" y="46" font-family="sans-serif" font-size="13" fill="#e53935">+V</text>
  <!-- Bottom plate − -->
  <rect x="265" y="193" width="160" height="12" fill="#1a73e8" rx="2"/>
  <text x="435" y="204" font-family="sans-serif" font-size="13" fill="#1a73e8">0 V</text>
  <!-- Uniform vertical field lines -->
  <line x1="290" y1="47" x2="290" y2="193" stroke="#555" stroke-width="1.2"/>
  <polygon points="290,193 286,181 294,181" fill="#555"/>
  <line x1="320" y1="47" x2="320" y2="193" stroke="#555" stroke-width="1.2"/>
  <polygon points="320,193 316,181 324,181" fill="#555"/>
  <line x1="350" y1="47" x2="350" y2="193" stroke="#555" stroke-width="1.2"/>
  <polygon points="350,193 346,181 354,181" fill="#555"/>
  <line x1="380" y1="47" x2="380" y2="193" stroke="#555" stroke-width="1.2"/>
  <polygon points="380,193 376,181 384,181" fill="#555"/>
  <line x1="410" y1="47" x2="410" y2="193" stroke="#555" stroke-width="1.2"/>
  <polygon points="410,193 406,181 414,181" fill="#555"/>
  <!-- E = V/d label -->
  <text x="270" y="125" font-family="sans-serif" font-size="12" fill="#555">E = V/d</text>
  <line x1="262" y1="47" x2="262" y2="193" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="248" y="125" font-family="sans-serif" font-size="11" fill="#888">d</text>
</svg>
