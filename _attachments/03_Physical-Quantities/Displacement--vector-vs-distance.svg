<svg xmlns="http://www.w3.org/2000/svg" width="460" height="220" viewBox="0 0 460 220">
  <rect width="460" height="220" fill="#ffffff"/>
  <!-- Start point -->
  <circle cx="60" cy="130" r="6" fill="#333"/>
  <text x="50" y="155" font-family="sans-serif" font-size="12" fill="#333">Start</text>
  <!-- End point -->
  <circle cx="380" cy="100" r="6" fill="#333"/>
  <text x="370" y="125" font-family="sans-serif" font-size="12" fill="#333">End</text>
  <!-- Curved path (actual distance) -->
  <path d="M60,130 Q180,30 300,80 Q350,95 380,100"
        fill="none" stroke="#aaa" stroke-width="2" stroke-dasharray="7,4"/>
  <!-- Path label -->
  <text x="160" y="42" font-family="sans-serif" font-size="12" fill="#888">distance (path length)</text>
  <!-- Straight displacement arrow -->
  <line x1="60" y1="130" x2="374" y2="102" stroke="#e53935" stroke-width="2.5"/>
  <polygon points="374,102 362,100 367,110" fill="#e53935"/>
  <!-- Displacement label -->
  <text x="180" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e53935">s (displacement)</text>
  <!-- Direction indicator -->
  <text x="155" y="160" font-family="sans-serif" font-size="11" fill="#e53935">straight line, start→end, has direction</text>
</svg>
