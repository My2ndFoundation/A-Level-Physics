<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" width="340" height="220" font-family="sans-serif" font-size="13">
  <rect width="340" height="220" fill="#f8f9fa" rx="8"/>
  <text x="170" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Work Done: W = Fs cosθ</text>

  <!-- Ground line -->
  <line x1="40" y1="160" x2="300" y2="160" stroke="#888" stroke-width="1.5"/>

  <!-- Object (box) -->
  <rect x="90" y="130" width="50" height="30" rx="4" fill="#bbdefb" stroke="#1a56db" stroke-width="1.5"/>
  <text x="115" y="149" text-anchor="middle" fill="#1a56db" font-size="11">m</text>

  <!-- Displacement arrow along ground -->
  <defs>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowF2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c62828"/>
    </marker>
  </defs>
  <line x1="140" y1="154" x2="260" y2="154" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="200" y="170" text-anchor="middle" fill="#2e7d32" font-size="12">s (displacement)</text>

  <!-- Applied force F at angle θ -->
  <line x1="115" y1="145" x2="185" y2="95" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrowF2)"/>
  <text x="195" y="90" fill="#c62828" font-size="13" font-weight="bold">F</text>

  <!-- Horizontal component of F (dashed) -->
  <line x1="115" y1="145" x2="185" y2="145" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="155" y="138" fill="#c62828" font-size="11">F cosθ</text>

  <!-- Angle arc -->
  <path d="M135,145 A22,22 0 0,0 125,126" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="140" y="127" fill="#e65100" font-size="12" font-style="italic">θ</text>

  <!-- Equation box -->
  <rect x="210" y="88" width="115" height="55" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="268" y="106" text-anchor="middle" fill="#e65100" font-size="13">W = Fs cosθ</text>
  <text x="268" y="122" text-anchor="middle" fill="#888" font-size="10">Only F cosθ does work</text>
  <text x="268" y="136" text-anchor="middle" fill="#888" font-size="10">along displacement s</text>

  <text x="170" y="212" text-anchor="middle" fill="#555" font-size="11">W = 0 if F ⊥ s (θ = 90°)</text>
</svg>
