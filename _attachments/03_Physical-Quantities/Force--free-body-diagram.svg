<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <rect width="320" height="320" fill="#ffffff"/>
  <!-- Object (block) -->
  <rect x="120" y="130" width="80" height="60" fill="#e3f2fd" stroke="#333" stroke-width="1.5" rx="4"/>
  <text x="148" y="167" font-family="sans-serif" font-size="13" fill="#333">m</text>
  <!-- Weight arrow (downward) -->
  <line x1="160" y1="190" x2="160" y2="255" stroke="#e53935" stroke-width="2.5"/>
  <polygon points="160,258 155,245 165,245" fill="#e53935"/>
  <text x="168" y="230" font-family="sans-serif" font-size="13" fill="#e53935">W = mg</text>
  <!-- Normal force arrow (upward) -->
  <line x1="160" y1="130" x2="160" y2="65" stroke="#1a73e8" stroke-width="2.5"/>
  <polygon points="160,62 155,75 165,75" fill="#1a73e8"/>
  <text x="168" y="100" font-family="sans-serif" font-size="13" fill="#1a73e8">N</text>
  <!-- Applied force arrow (right) -->
  <line x1="200" y1="160" x2="265" y2="160" stroke="#f57c00" stroke-width="2.5"/>
  <polygon points="268,160 255,155 255,165" fill="#f57c00"/>
  <text x="270" y="155" font-family="sans-serif" font-size="13" fill="#f57c00">F</text>
  <!-- Friction arrow (left) -->
  <line x1="120" y1="160" x2="55" y2="160" stroke="#7b1fa2" stroke-width="2.5"/>
  <polygon points="52,160 65,155 65,165" fill="#7b1fa2"/>
  <text x="20" y="155" font-family="sans-serif" font-size="13" fill="#7b1fa2">f</text>
  <!-- Ground surface -->
  <line x1="80" y1="195" x2="240" y2="195" stroke="#555" stroke-width="2"/>
  <line x1="80" y1="195" x2="80" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="90" y1="195" x2="80" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="110" y1="195" x2="100" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="130" y1="195" x2="120" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="150" y1="195" x2="140" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="170" y1="195" x2="160" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="190" y1="195" x2="180" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="210" y1="195" x2="200" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="230" y1="195" x2="220" y2="210" stroke="#555" stroke-width="1"/>
  <line x1="240" y1="195" x2="240" y2="210" stroke="#555" stroke-width="1"/>
</svg>
