<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="320" height="220" fill="#f8f9fa" rx="8"/>
  <!-- Title -->
  <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Force on a Current-Carrying Wire in Field B</text>

  <!-- Wire (horizontal, carrying current I into page) -->
  <line x1="80" y1="110" x2="240" y2="110" stroke="#1a56db" stroke-width="5" stroke-linecap="round"/>
  <text x="160" y="100" text-anchor="middle" fill="#1a56db" font-size="13">wire (current I →)</text>

  <!-- B field arrows pointing upward -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowF" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c62828"/>
    </marker>
  </defs>
  <!-- Several B field lines upward -->
  <line x1="60" y1="170" x2="60" y2="60" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="120" y1="170" x2="120" y2="60" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="180" y1="170" x2="180" y2="60" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="240" y1="170" x2="240" y2="60" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="300" y1="170" x2="300" y2="60" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="306" y="100" fill="#2e7d32" font-size="13" font-weight="bold">B</text>

  <!-- Force F pointing out of page (toward viewer) — shown as large arrow downward from wire -->
  <line x1="160" y1="110" x2="160" y2="185" stroke="#c62828" stroke-width="3" marker-end="url(#arrowF)"/>
  <text x="172" y="185" fill="#c62828" font-size="13" font-weight="bold">F = BIL</text>

  <!-- Labels -->
  <text x="160" y="210" text-anchor="middle" fill="#555" font-size="11">F ⊥ both I and B  (Left-Hand Rule)</text>
</svg>
