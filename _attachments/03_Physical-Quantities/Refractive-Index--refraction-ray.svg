<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240" font-family="sans-serif" font-size="13">
  <rect width="320" height="240" fill="#f8f9fa" rx="8"/>
  <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Refraction at a Boundary: n = c/v</text>

  <!-- Boundary line -->
  <line x1="20" y1="120" x2="300" y2="120" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Media labels -->
  <rect x="10" y="30" width="60" height="20" rx="4" fill="#e3f2fd"/>
  <text x="40" y="44" text-anchor="middle" fill="#1a56db" font-size="11">air  n₁≈1</text>
  <rect x="10" y="130" width="80" height="20" rx="4" fill="#e8f5e9"/>
  <text x="50" y="144" text-anchor="middle" fill="#2e7d32" font-size="11">glass  n₂≈1.5</text>

  <!-- Normal (dashed vertical) -->
  <line x1="160" y1="30" x2="160" y2="210" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="165" y="28" fill="#999" font-size="11">normal</text>

  <!-- Incident ray -->
  <defs>
    <marker id="arrowRay" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e65100"/>
    </marker>
  </defs>
  <line x1="80" y1="40" x2="160" y2="120" stroke="#e65100" stroke-width="2.2" marker-end="url(#arrowRay)"/>
  <!-- Refracted ray (bends toward normal — steeper) -->
  <line x1="160" y1="120" x2="190" y2="200" stroke="#e65100" stroke-width="2.2" marker-end="url(#arrowRay)"/>

  <!-- Angle of incidence arc -->
  <path d="M160,90 A30,30 0 0,0 137,104" fill="none" stroke="#1a56db" stroke-width="1.5"/>
  <text x="130" y="95" fill="#1a56db" font-size="12" font-style="italic">θ₁</text>

  <!-- Angle of refraction arc -->
  <path d="M160,150 A30,30 0 0,1 168,147" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="169" y="156" fill="#2e7d32" font-size="12" font-style="italic">θ₂</text>

  <!-- Equation -->
  <rect x="200" y="50" width="110" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="255" y="66" text-anchor="middle" fill="#e65100" font-size="12">n₁ sinθ₁ = n₂ sinθ₂</text>
  <text x="255" y="82" text-anchor="middle" fill="#888" font-size="10">Snell's Law</text>

  <text x="160" y="232" text-anchor="middle" fill="#555" font-size="11">Ray bends toward normal entering denser medium</text>
</svg>
