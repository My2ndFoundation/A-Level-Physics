<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200" font-family="sans-serif" font-size="13">
  <rect width="380" height="200" fill="#f8f9fa" rx="8"/>
  <text x="190" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Wavelength: Distance for One Complete Cycle</text>

  <!-- Axes -->
  <line x1="30" y1="110" x2="360" y2="110" stroke="#555" stroke-width="1.5"/>
  <line x1="30" y1="30" x2="30" y2="185" stroke="#555" stroke-width="1.5"/>
  <!-- Axis labels -->
  <text x="365" y="114" fill="#555" font-size="12">x</text>
  <text x="22" y="28" fill="#555" font-size="12">y</text>
  <text x="190" y="198" text-anchor="middle" fill="#555" font-size="11">Position (displacement–position snapshot)</text>

  <!-- Sine wave: amplitude ~50, wavelength ~160px, starting at x=30 -->
  <!-- One full cycle from x=30 to x=190, second from x=190 to x=350 -->
  <path d="M30,110 C55,50 85,50 110,110 C135,170 165,170 190,110 C215,50 245,50 270,110 C295,170 325,170 350,110"
        fill="none" stroke="#1a56db" stroke-width="2.5"/>

  <!-- Wavelength brace from crest to crest: x=110 to x=270, y=50 -->
  <line x1="110" y1="55" x2="270" y2="55" stroke="#c62828" stroke-width="1.8"/>
  <line x1="110" y1="50" x2="110" y2="62" stroke="#c62828" stroke-width="1.8"/>
  <line x1="270" y1="50" x2="270" y2="62" stroke="#c62828" stroke-width="1.8"/>
  <text x="190" y="48" text-anchor="middle" fill="#c62828" font-size="13" font-weight="bold">λ</text>

  <!-- Amplitude brace at x=350 -->
  <line x1="355" y1="110" x2="355" y2="60" stroke="#e65100" stroke-width="1.5"/>
  <line x1="352" y1="110" x2="358" y2="110" stroke="#e65100" stroke-width="1.5"/>
  <line x1="352" y1="60" x2="358" y2="60" stroke="#e65100" stroke-width="1.5"/>
  <text x="368" y="88" fill="#e65100" font-size="11">A</text>
</svg>
