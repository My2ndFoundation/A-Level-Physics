<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" width="340" height="220" font-family="sans-serif" font-size="13">
  <rect width="340" height="220" fill="#f8f9fa" rx="8"/>
  <text x="170" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Magnetic Flux: Φ = BA cosθ</text>

  <!-- Coil loop (ellipse representing tilted plane) -->
  <ellipse cx="170" cy="120" rx="70" ry="45" fill="none" stroke="#1a56db" stroke-width="2.5"/>
  <text x="170" y="125" text-anchor="middle" fill="#1a56db" font-size="12">area A</text>

  <!-- Normal to coil (dashed line) -->
  <line x1="170" y1="75" x2="170" y2="50" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="178" y="48" fill="#555" font-size="11">normal</text>

  <!-- B field arrows (angled) -->
  <defs>
    <marker id="arrowBf" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2e7d32"/>
    </marker>
  </defs>
  <line x1="50" y1="90" x2="120" y2="75" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrowBf)"/>
  <line x1="50" y1="120" x2="120" y2="105" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrowBf)"/>
  <line x1="50" y1="150" x2="120" y2="135" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arrowBf)"/>
  <text x="35" y="125" fill="#2e7d32" font-size="13" font-weight="bold">B</text>

  <!-- Angle arc between B and normal -->
  <path d="M170,75 A20,20 0 0,0 154,87" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="148" y="82" fill="#e65100" font-size="12" font-style="italic">θ</text>

  <!-- Equation box -->
  <rect x="220" y="100" width="105" height="44" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="273" y="119" text-anchor="middle" fill="#e65100" font-size="13">Φ = BA cosθ</text>
  <text x="273" y="136" text-anchor="middle" fill="#888" font-size="10">θ=0 → Φ=BA (max)</text>

  <text x="170" y="210" text-anchor="middle" fill="#555" font-size="11">Φ = 0 when B is parallel to the plane (θ = 90°)</text>
</svg>
