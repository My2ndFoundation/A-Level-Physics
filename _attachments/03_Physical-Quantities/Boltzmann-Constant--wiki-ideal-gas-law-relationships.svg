<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="-280 -190 525 350">
 <title>ideal gas law relationships</title>
 <desc>Relationships between Boyle's, Charles's, Gay-Lussac's, Avogadro's, combined and ideal gas laws, illustrated by CMG Lee.</desc>
 <style type="text/css">
  #main  { font-family:Helvetica,Arial,sans-serif; font-size:60px; text-anchor:middle;
           fill:none; stroke-width:3; stroke-linejoin:round; stroke-linecap:round; stroke:none; }
  #equation  { fill:#000000; stroke:#000000; font-family:Times,Times New Roman,serif; font-size:90px; }
  #boyle     { fill:#3333ff; stroke:#3333ff; }
  #charles   { fill:#00cccc; stroke:#00cccc; }
  #avogadro  { fill:#ff9900; stroke:#ff9900; }
  #gaylussac { fill:#00cc00; stroke:#00cc00; }
  #combined  { fill:#ff99cc; stroke:#ff99cc; }
  #ideal     { fill:#cccccc; stroke:#cccccc; }
  .vars      { opacity:0.5; stroke-width:60; }
  text       { stroke:none; cursor:default; }
 </style>
 <circle cx="0" cy="0" r="99999" fill="#ffffff"/>
 <g id="main">
  <g id="ideal">
   <circle class="vars" cx="0" cy="-10" r="80"/>
   <text x="230" y="-80" dy="0.7ex" text-anchor="end">ideal</text>
  </g>
  <g id="combined">
   <path class="vars" d="M 55,-55 V -110 L -50,-70 V 50 H -41 Z"/>
   <text x="230" y="-165" dy="0.7ex" text-anchor="end">combined</text>
  </g>
  <g id="boyle">
   <path class="vars" d="M -90,-50 H 48"/>
   <text x="-270" y="-40" dy="0.7ex" text-anchor="start">Boyle</text>
  </g>
  <g id="gaylussac">
   <path class="vars" d="M -45,-105 V 50"/>
   <text x="-270" y="-165" dy="0.7ex" text-anchor="start"
    ><tspan>Gay-</tspan><tspan x="-270" dy="50">Lussac</tspan></text>
  </g>
  <g id="charles">
   <path class="vars" d="M 50,-70 L -72,77"/>
   <text x="-270" y="122" dy="0.7ex" text-anchor="start">Charles</text>
  </g>
  <g id="avogadro">
   <path class="vars" d="M 45,-70 V 78"/>
   <text x="235" y="122" dy="0.7ex" text-anchor="end">Avogadro</text>
  </g>
  <g id="equation">
   <path d="M -70,0 H 70"/>
   <text x="-45" y="-50" dy="30" font-style="italic">P</text>
   <text x="-48"  y="50" dy="30" font-style="italic">T</text>
   <text  x="38" y="-50" dy="30" font-style="italic">V</text>
   <text  x="43"  y="50" dy="30" font-style="italic">N</text>
   <text  x="200" y="0"  dy="30"><tspan font-style="italic">k</tspan><tspan dy="5" font-size="30">B</tspan></text>
   <text  x="125" y="0"  dy="30">=</text>
  </g>
 </g>
</svg>
