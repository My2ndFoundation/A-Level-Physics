<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <rect width="320" height="320" fill="#ffffff"/>
  <!-- Circular path -->
  <circle cx="160" cy="160" r="110" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Centre dot -->
  <circle cx="160" cy="160" r="4" fill="#333"/>
  <text x="165" y="155" font-family="sans-serif" font-size="12" fill="#333">O</text>
  <!-- Radius line -->
  <line x1="160" y1="160" x2="238" y2="82" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Object (top-right of circle) -->
  <circle cx="238" cy="82" r="9" fill="#1a73e8"/>
  <!-- Centripetal acceleration arrow (inward, towards O) -->
  <line x1="238" y1="82" x2="193" y2="121" stroke="#e53935" stroke-width="2.5"/>
  <polygon points="193,121 203,114 199,125" fill="#e53935"/>
  <text x="215" y="92" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e53935">a = v²/r</text>
  <text x="195" y="106" font-family="sans-serif" font-size="11" fill="#e53935">(inward)</text>
  <!-- Velocity arrow (tangential, perpendicular) -->
  <line x1="238" y1="82" x2="300" y2="95" stroke="#1a73e8" stroke-width="2"/>
  <polygon points="300,95 290,86 293,97" fill="#1a73e8"/>
  <text x="302" y="90" font-family="sans-serif" font-size="13" fill="#1a73e8">v</text>
  <!-- r label on radius -->
  <text x="192" y="127" font-family="sans-serif" font-size="12" fill="#555">r</text>
</svg>
