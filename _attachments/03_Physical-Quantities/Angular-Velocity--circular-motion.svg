<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <rect width="320" height="320" fill="#ffffff"/>
  <!-- Circle path -->
  <circle cx="160" cy="160" r="110" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Centre -->
  <circle cx="160" cy="160" r="4" fill="#333"/>
  <text x="165" y="168" font-family="sans-serif" font-size="12" fill="#333">O</text>
  <!-- Radius to object -->
  <line x1="160" y1="160" x2="270" y2="160" stroke="#333" stroke-width="1.5"/>
  <!-- Object on circle -->
  <circle cx="270" cy="160" r="8" fill="#1a73e8"/>
  <!-- r label -->
  <text x="205" y="153" font-family="sans-serif" font-size="13" fill="#333">r</text>
  <!-- Tangential velocity arrow -->
  <line x1="270" y1="160" x2="270" y2="100" stroke="#e53935" stroke-width="2"/>
  <polygon points="270,97 266,110 274,110" fill="#e53935"/>
  <text x="278" y="130" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e53935">v = ωr</text>
  <!-- Arc showing angle delta-theta -->
  <path d="M220,160 A60,60 0 0,0 204,203" fill="none" stroke="#f57c00" stroke-width="1.5"/>
  <text x="215" y="195" font-family="sans-serif" font-size="13" fill="#f57c00">Δθ</text>
  <!-- omega label at centre -->
  <text x="120" y="155" font-family="sans-serif" font-size="15" fill="#555">ω = Δθ/Δt</text>
</svg>
