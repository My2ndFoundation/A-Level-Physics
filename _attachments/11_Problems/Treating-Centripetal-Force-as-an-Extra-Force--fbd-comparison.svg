<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 270" width="440" height="270" font-family="sans-serif" font-size="13">
  <rect width="440" height="270" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="220" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Ball on a String — Free-Body Diagram</text>

  <!-- ===== LEFT: WRONG diagram ===== -->
  <text x="110" y="45" text-anchor="middle" font-size="13" fill="#c00" font-weight="bold">WRONG (extra arrow)</text>

  <!-- Ball -->
  <circle cx="110" cy="140" r="22" fill="#ddeeff" stroke="#333" stroke-width="2"/>
  <text x="110" y="145" text-anchor="middle" font-size="11" fill="#333">ball</text>

  <!-- Weight arrow (down) -->
  <line x1="110" y1="162" x2="110" y2="210" stroke="#555" stroke-width="2.2" marker-end="url(#arrowDark)"/>
  <text x="118" y="205" fill="#555" font-size="11">W = mg</text>

  <!-- Tension arrow (up-right toward string attachment) -->
  <line x1="110" y1="118" x2="110" y2="65" stroke="#0055cc" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="115" y="72" fill="#0055cc" font-size="11">T (tension)</text>

  <!-- WRONG extra centripetal arrow (inward to left) -->
  <line x1="88" y1="140" x2="35" y2="140" stroke="#c00" stroke-width="2.2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="5" y="132" fill="#c00" font-size="10" font-weight="bold">F_c</text>
  <text x="5" y="144" fill="#c00" font-size="10">(extra!)</text>

  <!-- X mark -->
  <text x="32" y="185" fill="#c00" font-size="28" font-weight="bold">✗</text>

  <!-- Divider -->
  <line x1="220" y1="35" x2="220" y2="255" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: CORRECT diagram ===== -->
  <text x="330" y="45" text-anchor="middle" font-size="13" fill="#228B22" font-weight="bold">CORRECT (real forces only)</text>

  <!-- Ball -->
  <circle cx="330" cy="140" r="22" fill="#ddeeff" stroke="#333" stroke-width="2"/>
  <text x="330" y="145" text-anchor="middle" font-size="11" fill="#333">ball</text>

  <!-- Weight arrow (down) -->
  <line x1="330" y1="162" x2="330" y2="210" stroke="#555" stroke-width="2.2" marker-end="url(#arrowDark)"/>
  <text x="338" y="205" fill="#555" font-size="11">W = mg</text>

  <!-- Tension arrow (up, providing centripetal) -->
  <line x1="330" y1="118" x2="330" y2="65" stroke="#0055cc" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="335" y="72" fill="#0055cc" font-size="11">T (tension)</text>

  <!-- Annotation: horizontal component is centripetal -->
  <text x="330" y="240" text-anchor="middle" fill="#228B22" font-size="11">Net inward = mv²/r</text>
  <text x="330" y="254" text-anchor="middle" fill="#228B22" font-size="10">(no extra arrow needed)</text>

  <!-- Check mark -->
  <text x="242" y="185" fill="#228B22" font-size="28" font-weight="bold">✓</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0055cc"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c00"/>
    </marker>
  </defs>
</svg>
