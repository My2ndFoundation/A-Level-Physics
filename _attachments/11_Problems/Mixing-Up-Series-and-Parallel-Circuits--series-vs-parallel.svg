<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 230" width="460" height="230" font-family="sans-serif" font-size="13">
  <rect width="460" height="230" fill="#fafafa" rx="8"/>

  <!-- SERIES circuit (left half) -->
  <text x="115" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#0055cc">Series: R_total = R1 + R2</text>

  <!-- Wire top: battery left terminal to R1 -->
  <line x1="30" y1="60" x2="30" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="30" y1="60" x2="200" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="60" x2="200" y2="110" stroke="#333" stroke-width="2"/>
  <!-- Bottom wire -->
  <line x1="30" y1="170" x2="200" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="30" y1="110" x2="30" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="200" y1="110" x2="200" y2="170" stroke="#333" stroke-width="2"/>

  <!-- R1 box -->
  <rect x="60" y="110" width="50" height="28" fill="#fff" stroke="#0055cc" stroke-width="2" rx="3"/>
  <text x="85" y="129" text-anchor="middle" fill="#0055cc" font-weight="bold">R1</text>
  <line x1="30" y1="124" x2="60" y2="124" stroke="#333" stroke-width="2"/>
  <line x1="110" y1="124" x2="135" y2="124" stroke="#333" stroke-width="2"/>

  <!-- R2 box -->
  <rect x="135" y="110" width="50" height="28" fill="#fff" stroke="#0055cc" stroke-width="2" rx="3"/>
  <text x="160" y="129" text-anchor="middle" fill="#0055cc" font-weight="bold">R2</text>
  <line x1="185" y1="124" x2="200" y2="124" stroke="#333" stroke-width="2"/>

  <!-- Battery symbol (left side, series) -->
  <line x1="30" y1="60" x2="30" y2="85" stroke="#333" stroke-width="2"/>
  <line x1="22" y1="85" x2="38" y2="85" stroke="#333" stroke-width="2.5"/>
  <line x1="26" y1="92" x2="34" y2="92" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="92" x2="30" y2="110" stroke="#333" stroke-width="2"/>

  <!-- Same current label -->
  <text x="115" y="155" text-anchor="middle" fill="#555" font-size="11">Same current through both</text>
  <text x="115" y="195" text-anchor="middle" fill="#c00" font-size="11">6+6 = 12 Ω — SERIES rule only</text>

  <!-- Divider -->
  <line x1="235" y1="10" x2="235" y2="220" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- PARALLEL circuit (right half) -->
  <text x="350" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#228B22">Parallel: 1/R = 1/R1 + 1/R2</text>

  <!-- Top and bottom rails -->
  <line x1="260" y1="60" x2="440" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="260" y1="170" x2="440" y2="170" stroke="#333" stroke-width="2"/>

  <!-- Left wire -->
  <line x1="260" y1="60" x2="260" y2="170" stroke="#333" stroke-width="2"/>
  <!-- Right wire -->
  <line x1="440" y1="60" x2="440" y2="170" stroke="#333" stroke-width="2"/>

  <!-- R1 branch -->
  <line x1="310" y1="60" x2="310" y2="95" stroke="#333" stroke-width="2"/>
  <rect x="285" y="95" width="50" height="28" fill="#fff" stroke="#228B22" stroke-width="2" rx="3"/>
  <text x="310" y="114" text-anchor="middle" fill="#228B22" font-weight="bold">R1</text>
  <line x1="310" y1="123" x2="310" y2="170" stroke="#333" stroke-width="2"/>

  <!-- R2 branch -->
  <line x1="390" y1="60" x2="390" y2="95" stroke="#333" stroke-width="2"/>
  <rect x="365" y="95" width="50" height="28" fill="#fff" stroke="#228B22" stroke-width="2" rx="3"/>
  <text x="390" y="114" text-anchor="middle" fill="#228B22" font-weight="bold">R2</text>
  <line x1="390" y1="123" x2="390" y2="170" stroke="#333" stroke-width="2"/>

  <!-- Battery symbol (left side, parallel) -->
  <line x1="260" y1="60" x2="260" y2="85" stroke="#333" stroke-width="2"/>
  <line x1="252" y1="85" x2="268" y2="85" stroke="#333" stroke-width="2.5"/>
  <line x1="256" y1="92" x2="264" y2="92" stroke="#333" stroke-width="1.5"/>
  <line x1="260" y1="92" x2="260" y2="110" stroke="#333" stroke-width="2"/>

  <!-- Same PD label -->
  <text x="350" y="155" text-anchor="middle" fill="#555" font-size="11">Same PD across both</text>
  <text x="350" y="195" text-anchor="middle" fill="#228B22" font-size="11">R_total = 3 Ω (half of one)</text>
</svg>
