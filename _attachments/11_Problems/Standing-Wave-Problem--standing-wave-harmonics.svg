<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320" font-family="sans-serif" font-size="13">
  <rect width="480" height="320" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="240" y="22" fill="#333" font-size="13" text-anchor="middle" font-weight="bold">Standing waves on a string fixed at both ends</text>

  <!-- ===== Fundamental (n=1, L = λ/2) ===== -->
  <text x="16" y="58" fill="#555" font-size="12" font-weight="bold">n = 1  (fundamental)  L = λ/2</text>
  <!-- fixed ends -->
  <rect x="30" y="60" width="8" height="40" fill="#555" rx="2"/>
  <rect x="442" y="60" width="8" height="40" fill="#555" rx="2"/>
  <!-- half-sine arch (antinode at centre) -->
  <path d="M38,80 Q240,30 442,80" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <!-- node markers -->
  <circle cx="38" cy="80" r="5" fill="#555"/>
  <circle cx="442" cy="80" r="5" fill="#555"/>
  <!-- antinode marker -->
  <circle cx="240" cy="46" r="5" fill="#2563eb"/>
  <!-- labels -->
  <text x="240" y="100" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="38" y="100" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="442" y="100" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="240" y="42" fill="#2563eb" font-size="11" text-anchor="middle">A</text>

  <!-- ===== 2nd harmonic (n=2, L = λ) ===== -->
  <text x="16" y="158" fill="#555" font-size="12" font-weight="bold">n = 2  (second harmonic)  L = λ</text>
  <rect x="30" y="160" width="8" height="40" fill="#555" rx="2"/>
  <rect x="442" y="160" width="8" height="40" fill="#555" rx="2"/>
  <!-- full sine: two half-arches, one above, one below -->
  <path d="M38,180 Q139,135 240,180 Q341,225 442,180" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <!-- nodes -->
  <circle cx="38" cy="180" r="5" fill="#555"/>
  <circle cx="240" cy="180" r="5" fill="#555"/>
  <circle cx="442" cy="180" r="5" fill="#555"/>
  <!-- antinodes -->
  <circle cx="139" cy="148" r="5" fill="#16a34a"/>
  <circle cx="341" cy="212" r="5" fill="#16a34a"/>
  <text x="38" y="200" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="240" y="200" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="442" y="200" fill="#555" font-size="11" text-anchor="middle">N</text>
  <text x="139" y="144" fill="#16a34a" font-size="11" text-anchor="middle">A</text>
  <text x="341" y="230" fill="#16a34a" font-size="11" text-anchor="middle">A</text>

  <!-- Length annotation -->
  <line x1="38" y1="250" x2="442" y2="250" stroke="#555" stroke-width="1.5"/>
  <line x1="38" y1="244" x2="38" y2="256" stroke="#555" stroke-width="1.5"/>
  <line x1="442" y1="244" x2="442" y2="256" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="268" fill="#333" font-size="12" text-anchor="middle">L (length of string)</text>

  <!-- Half-wavelength annotation for n=1 -->
  <line x1="38" y1="285" x2="240" y2="285" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="139" y="300" fill="#333" font-size="11" text-anchor="middle">λ/2 (for n = 1)</text>
  <line x1="240" y1="285" x2="442" y2="285" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="341" y="300" fill="#333" font-size="11" text-anchor="middle">λ/2 (for n = 2)</text>

  <!-- Key: N=node, A=antinode -->
  <text x="16" y="316" fill="#555" font-size="11">N = node (zero displacement),  A = antinode (maximum displacement)</text>
</svg>
