<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 340" width="380" height="340" font-family="sans-serif" font-size="13">
  <rect width="380" height="340" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="190" y="22" fill="#333" font-size="13" text-anchor="middle" font-weight="bold">Conical pendulum: force diagram</text>

  <!-- Ceiling pivot -->
  <rect x="155" y="35" width="70" height="10" fill="#888" rx="2"/>
  <circle cx="190" cy="45" r="4" fill="#555"/>

  <!-- String line (30° to vertical) -->
  <!-- String goes from (190,45) to (190+L sin30°, 45+L cos30°) = (190+95, 45+164) = (285, 209) -->
  <line x1="190" y1="45" x2="285" y2="209" stroke="#555" stroke-width="2"/>

  <!-- Ball -->
  <circle cx="285" cy="209" r="14" fill="#2563eb" opacity="0.85"/>
  <text x="285" y="213" fill="white" font-size="11" text-anchor="middle">m</text>

  <!-- Vertical dashed line from pivot -->
  <line x1="190" y1="45" x2="190" y2="240" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Angle arc -->
  <path d="M190,90 A45,45 0 0,1 213,72" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="210" y="100" fill="#555" font-size="12">30°</text>

  <!-- Tension vector (along string, from ball toward pivot) -->
  <!-- Direction: (190-285, 45-209) normalised × 80 = (-95,-164)/188.5 × 80 = (-40.3,-69.6) -->
  <line x1="285" y1="209" x2="247" y2="144" stroke="#e07800" stroke-width="2.5" marker-end="url(#arrowT)"/>
  <text x="246" y="138" fill="#e07800" font-size="13" font-weight="bold">T</text>

  <!-- Tension vertical component (T cos30°) dashed up -->
  <line x1="285" y1="209" x2="285" y2="144" stroke="#e07800" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowTd)"/>
  <text x="295" y="178" fill="#e07800" font-size="11">T cos 30°</text>

  <!-- Weight vector (downward) -->
  <line x1="285" y1="209" x2="285" y2="270" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowW)"/>
  <text x="295" y="248" fill="#dc2626" font-size="13" font-weight="bold">mg</text>

  <!-- Horizontal centripetal component (T sin30°, inward) -->
  <line x1="285" y1="180" x2="220" y2="180" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowC)"/>
  <text x="222" y="174" fill="#16a34a" font-size="11">T sin 30°</text>
  <text x="200" y="195" fill="#16a34a" font-size="11">(centripetal)</text>

  <!-- Circular orbit plane (ellipse) -->
  <ellipse cx="285" cy="228" rx="95" ry="20" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="232" fill="#aaa" font-size="11">orbit</text>

  <!-- Radius annotation -->
  <line x1="190" y1="228" x2="285" y2="228" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="235" y="244" fill="#555" font-size="11" text-anchor="middle">r = L sin 30°</text>

  <defs>
    <marker id="arrowT" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e07800"/>
    </marker>
    <marker id="arrowTd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e07800"/>
    </marker>
    <marker id="arrowW" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowC" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
