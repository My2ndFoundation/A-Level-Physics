<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" font-family="sans-serif" font-size="13">
  <rect width="480" height="300" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="240" y="22" fill="#333" font-size="13" text-anchor="middle" font-weight="bold">Cliff projectile: horizontal launch, independent motion axes</text>

  <!-- Ground -->
  <rect x="170" y="240" width="290" height="12" fill="#8B7355" rx="2"/>
  <line x1="170" y1="240" x2="460" y2="240" stroke="#555" stroke-width="2"/>

  <!-- Cliff face -->
  <rect x="30" y="80" width="140" height="160" fill="#c0a882" rx="3"/>
  <line x1="30" y1="80" x2="170" y2="80" stroke="#555" stroke-width="2"/>
  <line x1="170" y1="80" x2="170" y2="240" stroke="#555" stroke-width="2"/>

  <!-- Height annotation -->
  <line x1="16" y1="80" x2="16" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="10" y1="80" x2="22" y2="80" stroke="#555" stroke-width="1.5"/>
  <line x1="10" y1="240" x2="22" y2="240" stroke="#555" stroke-width="1.5"/>
  <text x="8" y="165" fill="#333" font-size="12" text-anchor="middle" transform="rotate(-90,8,165)">h = 32 m</text>

  <!-- Launch point -->
  <circle cx="170" cy="80" r="5" fill="#2563eb"/>
  <text x="175" y="76" fill="#2563eb" font-size="12" font-weight="bold">launch</text>

  <!-- Horizontal velocity arrow -->
  <line x1="170" y1="80" x2="250" y2="80" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGr)"/>
  <text x="210" y="72" fill="#16a34a" font-size="12" text-anchor="middle">u_x = 14 m/s (const)</text>

  <!-- Parabolic trajectory (horizontal launch from (170,80), lands at approx x=356, y=240) -->
  <path d="M170,80 Q290,100 356,240" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Landing point -->
  <circle cx="356" cy="240" r="5" fill="#dc2626"/>
  <text x="356" y="258" fill="#dc2626" font-size="12" text-anchor="middle">land</text>

  <!-- Vertical fall arrow (at launch) -->
  <line x1="190" y1="90" x2="190" y2="165" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowRed)"/>
  <text x="196" y="135" fill="#dc2626" font-size="11">a = g (down)</text>

  <!-- Horizontal range annotation -->
  <line x1="170" y1="255" x2="356" y2="255" stroke="#555" stroke-width="1.5"/>
  <line x1="170" y1="249" x2="170" y2="261" stroke="#555" stroke-width="1.5"/>
  <line x1="356" y1="249" x2="356" y2="261" stroke="#555" stroke-width="1.5"/>
  <text x="263" y="272" fill="#333" font-size="12" text-anchor="middle">x = u_x · t  (horizontal range)</text>

  <!-- Initial vertical velocity = 0 -->
  <text x="178" y="100" fill="#555" font-size="11">u_y = 0</text>

  <defs>
    <marker id="arrowGr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
