<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="sans-serif" font-size="13">
  <!-- Background -->
  <rect width="320" height="260" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="160" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Vector Addition of Two Perpendicular Forces</text>

  <!-- Origin point -->
  <circle cx="80" cy="180" r="4" fill="#333"/>
  <text x="68" y="198" fill="#333" font-size="12">O</text>

  <!-- East force arrow (5 N, horizontal right) -->
  <line x1="80" y1="180" x2="200" y2="180" stroke="#e05000" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="135" y="200" text-anchor="middle" fill="#e05000" font-weight="bold">5 N east</text>

  <!-- North force arrow (5 N, vertical up) -->
  <line x1="80" y1="180" x2="80" y2="60" stroke="#0055cc" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="18" y="125" fill="#0055cc" font-weight="bold">5 N north</text>

  <!-- Dashed completion lines for parallelogram -->
  <line x1="200" y1="180" x2="200" y2="60" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="80" y1="60" x2="200" y2="60" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Resultant arrow (5√2 ≈ 7.1 N, diagonal) -->
  <line x1="80" y1="180" x2="200" y2="60" stroke="#228B22" stroke-width="2.8" marker-end="url(#arrowG)"/>
  <text x="158" y="108" fill="#228B22" font-weight="bold">≈ 7.1 N</text>
  <text x="152" y="122" fill="#228B22" font-size="11">45° N of E</text>

  <!-- Angle arc at origin -->
  <path d="M 110,180 A 30,30 0 0 0 80,150" fill="none" stroke="#228B22" stroke-width="1.2"/>
  <text x="112" y="162" fill="#228B22" font-size="11">45°</text>

  <!-- Wrong answer label -->
  <rect x="205" y="168" width="105" height="28" rx="4" fill="#ffe0e0" stroke="#e05000" stroke-width="1"/>
  <text x="257" y="180" text-anchor="middle" fill="#c00" font-size="11" font-weight="bold">Wrong: 5+5 = 10 N</text>
  <text x="257" y="192" text-anchor="middle" fill="#c00" font-size="10">(no direction)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05000"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0055cc"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#228B22"/>
    </marker>
  </defs>
</svg>
