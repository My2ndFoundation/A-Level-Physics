<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="360" height="300" font-family="sans-serif" font-size="13">
  <rect width="360" height="300" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="180" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Conical Pendulum — Force Resolution</text>

  <!-- Pivot point -->
  <circle cx="180" cy="50" r="5" fill="#333"/>
  <text x="190" y="48" fill="#333" font-size="11">pivot</text>

  <!-- String (at angle θ from vertical) -->
  <!-- Ball at (260, 170) -->
  <line x1="180" y1="50" x2="260" y2="170" stroke="#555" stroke-width="2.2"/>

  <!-- Angle arc at pivot -->
  <path d="M 180,80 A 30,30 0 0 1 197,66" fill="none" stroke="#888" stroke-width="1.3"/>
  <text x="190" y="85" fill="#555" font-size="11">θ</text>

  <!-- Vertical dashed axis -->
  <line x1="180" y1="50" x2="180" y2="200" stroke="#bbb" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Circular orbit (ellipse for perspective) -->
  <ellipse cx="260" cy="200" rx="60" ry="16" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="180" y1="200" x2="260" y2="200" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="215" y="218" fill="#777" font-size="11">r</text>

  <!-- Ball -->
  <circle cx="260" cy="170" r="18" fill="#ddeeff" stroke="#333" stroke-width="2"/>
  <text x="260" y="175" text-anchor="middle" font-size="11" fill="#333">m</text>

  <!-- Tension arrow (along string toward pivot) -->
  <line x1="260" y1="170" x2="194" y2="64" stroke="#0055cc" stroke-width="2.2" marker-end="url(#arrowBlue2)"/>
  <text x="207" y="112" fill="#0055cc" font-size="11">T</text>

  <!-- Vertical component of tension -->
  <line x1="260" y1="170" x2="260" y2="95" stroke="#0055cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="268" y="132" fill="#0055cc" font-size="11">T cosθ</text>
  <text x="264" y="145" fill="#555" font-size="10">= mg</text>

  <!-- Horizontal component of tension (centripetal) -->
  <line x1="260" y1="170" x2="194" y2="170" stroke="#228B22" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowGreen2)"/>
  <text x="214" y="163" fill="#228B22" font-size="11">T sinθ</text>
  <text x="210" y="188" fill="#228B22" font-size="10">= mv²/r</text>

  <!-- Weight arrow (down) -->
  <line x1="260" y1="188" x2="260" y2="240" stroke="#e05000" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <text x="268" y="238" fill="#e05000" font-size="11">mg</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0055cc"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#228B22"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05000"/>
    </marker>
  </defs>
</svg>
